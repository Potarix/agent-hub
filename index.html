<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #09090f;
      --bg-1: #0f0f18;
      --bg-2: #161621;
      --bg-3: #1e1e2d;
      --bg-4: #292940;
      --border: #1f1f32;
      --border-light: #2e2e48;
      --text-0: #eeeef4;
      --text-1: #b8b8cc;
      --text-2: #6e6e8a;
      --accent: #7c6aff;
      --accent-dim: #6454d4;
      --accent-glow: rgba(124,106,255,0.15);
      --accent-subtle: rgba(124,106,255,0.08);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.1);
      --orange: #fbbf24;
      --orange-dim: rgba(251,191,36,0.1);
      --blue: #60a5fa;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html[data-theme="light"],
    html[data-theme="light"] *,
    html.light-theme {
      --bg-0: #f4f4f8;
      --bg-1: #ffffff;
      --bg-2: #f0f0f5;
      --bg-3: #e6e6ef;
      --bg-4: #d8d8e4;
      --border: #e0e0ec;
      --border-light: #ccccd8;
      --text-0: #16162a;
      --text-1: #3e3e58;
      --text-2: #7a7a96;
      --accent: #6c5ce7;
      --accent-dim: #5b4cc9;
      --accent-glow: rgba(108,92,231,0.12);
      --accent-subtle: rgba(108,92,231,0.06);
      --green: #059669;
      --green-dim: rgba(5,150,105,0.08);
      --red: #dc2626;
      --red-dim: rgba(220,38,38,0.06);
      --orange: #d97706;
      --orange-dim: rgba(217,119,6,0.08);
      --blue: #2563eb;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-0);
      color: var(--text-0);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, input, textarea, select {
      -webkit-app-region: no-drag;
      font-family: inherit;
    }

    /* ── Layout ── */
    #root { height: 100vh; display: flex; flex-direction: column; }

    .titlebar {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 80px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
      -webkit-app-region: drag;
    }

    .titlebar-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .titlebar-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 272px;
      background: var(--bg-1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-2);
      font-weight: 700;
    }

    .btn-icon {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all var(--transition);
    }
    .btn-icon:hover { background: var(--bg-3); color: var(--text-0); border-color: var(--border-light); }

    .agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .agent-card {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 2px;
      border: 1px solid transparent;
      position: relative;
    }
    .agent-card:hover { background: var(--bg-2); }
    .agent-card.active {
      background: var(--accent-subtle);
      border-color: rgba(124,106,255,0.2);
    }
    .agent-card.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--accent);
    }

    .agent-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .agent-avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: -0.5px;
      box-shadow: var(--shadow-sm);
    }

    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.1px; }
    .agent-provider { font-size: 11px; color: var(--text-2); margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .status-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
    .status-dot.offline { background: var(--text-2); opacity: 0.5; }
    .status-dot.checking { background: var(--orange); animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-settings {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition);
    }
    .btn-settings:hover { background: var(--bg-2); color: var(--text-1); border-color: var(--border-light); }

    /* ── Main content ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-0);
      min-width: 0;
    }

    /* ── Dashboard (no agent selected) ── */
    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      gap: 20px;
    }

    .dash-logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #a78bfa, #c4b5fd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: white;
      box-shadow: 0 8px 32px rgba(124,106,255,0.3);
      letter-spacing: -1px;
    }

    .dash-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-0), var(--text-1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-sub { color: var(--text-2); font-size: 14px; text-align: center; max-width: 420px; line-height: 1.7; }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 520px;
      width: 100%;
      margin-top: 16px;
    }

    .dash-stat {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      transition: all var(--transition);
    }
    .dash-stat:hover { border-color: var(--border-light); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .dash-stat-num { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
    .dash-stat-label { font-size: 10px; color: var(--text-2); margin-top: 6px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }

    /* ── Chat ── */
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-1);
    }
    .chat-header .agent-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), #6454d4);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 2px 12px rgba(124,106,255,0.2);
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-sm);
    }
    .msg.assistant code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--bg-3);
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid var(--border);
    }
    .thinking-block {
      margin-bottom: 8px;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .thinking-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      padding: 4px 0;
      transition: color var(--transition);
    }
    .thinking-toggle:hover { color: var(--accent); }
    .thinking-icon { font-size: 10px; }
    .thinking-content {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-2);
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.5;
    }
    .msg.error {
      align-self: center;
      background: var(--red-dim);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--red);
      font-size: 13px;
      border-radius: 10px;
    }
    .msg.system {
      align-self: center;
      background: var(--accent-subtle);
      border: 1px solid rgba(124,106,255,0.15);
      color: var(--accent);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      white-space: pre-wrap;
      border-radius: 10px;
    }

    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 16px 18px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 6px;
      animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-2);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.16s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    .chat-input-bar {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg-1);
      position: relative;
    }
    .chat-input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-2);
      padding: 8px 10px 8px 16px;
      transition: all var(--transition);
      position: relative;
    }
    .chat-input-wrap:focus-within {
      border-color: rgba(124,106,255,0.4);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: var(--bg-1);
    }

    .chat-input {
      flex: 1;
      padding: 4px 0;
      border: none;
      background: transparent;
      color: var(--text-0);
      font-size: 14px;
      line-height: 1.5;
      outline: none;
      resize: none;
      min-height: 21px;
      max-height: 200px;
      overflow-y: auto;
    }
    .chat-input::placeholder { color: var(--text-2); }

    .btn-send {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(124,106,255,0.25);
    }
    .btn-send:hover { background: var(--accent-dim); transform: scale(1.04); }
    .btn-send:active { transform: scale(0.96); }
    .btn-send:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── Settings modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 560px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.2px; }
    .modal h3 {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; font-weight: 500; }
    .form-row input, .form-row select {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-0);
      font-size: 13px;
      outline: none;
      transition: all var(--transition);
    }
    .form-row input:focus, .form-row select:focus {
      border-color: rgba(124,106,255,0.4);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: var(--bg-1);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: -0.1px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(124,106,255,0.2); }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-1); }
    .btn-ghost:hover { background: var(--bg-2); border-color: var(--border-light); }
    .btn-danger { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.15); }
    .btn-test { background: var(--green-dim); border: 1px solid rgba(52,211,153,0.2); color: var(--green); }
    .btn-test:hover { background: rgba(52,211,153,0.15); }
    .btn-test:disabled { opacity: 0.4; cursor: not-allowed; }

    .test-result {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      font-family: 'JetBrains Mono', monospace;
    }
    .test-result.success { background: var(--green-dim); border: 1px solid rgba(52,211,153,0.2); color: var(--green); }
    .test-result.failure { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }
    .test-result.testing { background: var(--orange-dim); border: 1px solid rgba(251,191,36,0.2); color: var(--orange); }

    .presets-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .preset-card {
      padding: 16px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }
    .preset-card:hover { border-color: rgba(124,106,255,0.3); background: var(--accent-subtle); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .preset-card-icon { font-size: 22px; margin-bottom: 8px; font-weight: 700; }
    .preset-card-name { font-size: 13px; font-weight: 600; letter-spacing: -0.1px; }
    .preset-card-desc { font-size: 11px; color: var(--text-2); margin-top: 4px; line-height: 1.4; }

    .empty-list {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ── Provider colors ── */
    .provider-openclaws { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
    .provider-openai { background: linear-gradient(135deg, #10a37f, #0d8c6d); color: white; }
    .provider-claude-code { background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a1a2e; }
    .provider-hermes { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; }
    .provider-codex { background: linear-gradient(135deg, #10a37f, #0d8c6d); color: white; }
    .provider-generic { background: linear-gradient(135deg, var(--blue), #3b82f6); color: white; }

    /* ── Slash Command Palette ── */
    .slash-palette {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      margin-bottom: 6px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: var(--shadow-lg);
      animation: paletteIn 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 4px;
    }
    @keyframes paletteIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slash-palette-item {
      padding: 9px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.1s;
      border-radius: 8px;
    }
    .slash-palette-item:hover, .slash-palette-item.selected {
      background: var(--accent-subtle);
    }
    .slash-palette-item.selected {
      background: var(--accent-subtle);
      border: 1px solid rgba(124,106,255,0.15);
    }
    .slash-palette-item-name {
      font-size: 13px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }
    .slash-palette-item-desc {
      font-size: 12px;
      color: var(--text-2);
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all var(--transition);
      -webkit-app-region: no-drag;
    }
    .theme-toggle:hover { background: var(--bg-3); color: var(--text-0); }

    /* ── Chat empty state ── */
    .chat-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      padding: 40px;
    }
    .chat-empty-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--accent-subtle);
      border: 1px solid rgba(124,106,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .chat-empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.2px;
    }
    .chat-empty-hint {
      font-size: 13px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chat-empty-kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 5px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Agent card in settings ── */
    .settings-agent-card {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      margin-bottom: 6px;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .settings-agent-card:hover {
      background: var(--bg-2);
      border-color: var(--border-light);
    }
    .settings-agent-card .edit-arrow {
      font-size: 12px;
      color: var(--text-2);
      margin-left: auto;
      transition: all var(--transition);
    }
    .settings-agent-card:hover .edit-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Default agents config ──
    const DEFAULT_AGENTS = [
      {
        id: 'claude-code-1',
        name: 'Claude Code',
        provider: 'claude-code',
        workDir: '',
        model: '',
        claudePath: '',
        claudeArgs: '',
        emoji: 'CC',
        providerClass: 'provider-claude-code',
        maxTokens: 16384,
      },
    ];

    function loadAgents() {
      try {
        const saved = localStorage.getItem('agent-hub-agents');
        return saved ? JSON.parse(saved) : DEFAULT_AGENTS;
      } catch { return DEFAULT_AGENTS; }
    }

    function saveAgents(agents) {
      localStorage.setItem('agent-hub-agents', JSON.stringify(agents));
    }

    function loadChats() {
      try {
        const saved = localStorage.getItem('agent-hub-chats');
        return saved ? JSON.parse(saved) : {};
      } catch { return {}; }
    }

    function saveChats(chats) {
      localStorage.setItem('agent-hub-chats', JSON.stringify(chats));
    }

    // ── Auth Login Button (in-app, no terminal) ──
    function AuthLoginButton({ agent, onSuccess }) {
      const [authState, setAuthState] = useState('idle'); // idle | logging-in | waiting-for-code | success | error
      const [authMsg, setAuthMsg] = useState('');
      const [codeInput, setCodeInput] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const codeRef = useRef(null);

      useEffect(() => {
        const handleStatus = (agentId, status) => {
          if (agentId !== agent.id) return;
          if (status === 'waiting-for-code') {
            setAuthState('waiting-for-code');
            setAuthMsg('Browser opened — paste the code you see after logging in.');
            setSubmitting(false);
            setTimeout(() => codeRef.current?.focus(), 100);
          } else if (status === 'authenticated') {
            setAuthState('success');
            setAuthMsg('Authenticated!');
            if (onSuccess) onSuccess();
          } else if (status === 'error') {
            // Only show error if we're not already in success state
            setAuthState(prev => prev === 'success' ? prev : 'error');
            setAuthMsg(prev => prev || 'Authentication failed. Please try again.');
            setSubmitting(false);
          }
        };
        window.agentHub.onAuthStatus(handleStatus);
        return () => window.agentHub.removeAuthListeners();
      }, [agent.id]);

      const handleLogin = async () => {
        setAuthState('logging-in');
        setAuthMsg('Starting login...');
        setCodeInput('');
        setSubmitting(false);
        const res = await window.agentHub.authLogin(agent);
        // The handler returns immediately with pending: true.
        // All real updates come via auth-status events above.
        if (res.error) {
          setAuthState('error');
          setAuthMsg(res.error);
        }
      };

      const handleSubmitCode = async () => {
        if (!codeInput.trim()) return;
        setSubmitting(true);
        setAuthMsg('Code submitted — waiting for confirmation...');
        const res = await window.agentHub.authSendInput(agent.id, codeInput.trim());
        if (res.error) {
          setSubmitting(false);
          setAuthState('error');
          setAuthMsg(res.error);
        }
        // If no error, stay in submitting state — the auth-status event
        // will move us to 'success' or 'error' when the process completes.
      };

      const handleCodeKeyDown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSubmitCode();
        }
      };

      return (
        <div style={{ marginTop: 10 }}>
          {authState === 'idle' && (
            <button className="btn btn-primary" onClick={handleLogin}>
              Login
            </button>
          )}
          {authState === 'logging-in' && (
            <button className="btn btn-primary" disabled style={{ opacity: 0.7 }}>
              Logging in...
            </button>
          )}
          {authState === 'waiting-for-code' && (
            <div>
              <div style={{ fontSize: 13, color: submitting ? 'var(--text-2)' : 'var(--orange)', marginBottom: 8 }}>
                {authMsg}
              </div>
              {!submitting && (
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <input
                    ref={codeRef}
                    type="text"
                    value={codeInput}
                    onChange={(e) => setCodeInput(e.target.value)}
                    onKeyDown={handleCodeKeyDown}
                    placeholder="Paste code here"
                    style={{
                      background: 'var(--bg-2)',
                      border: '1px solid var(--border-light)',
                      borderRadius: 'var(--radius-sm)',
                      padding: '6px 10px',
                      color: 'var(--text-0)',
                      fontFamily: 'JetBrains Mono, monospace',
                      fontSize: 14,
                      width: 220,
                      letterSpacing: '2px',
                    }}
                  />
                  <button
                    className="btn btn-primary"
                    onClick={handleSubmitCode}
                    disabled={!codeInput.trim()}
                  >
                    Submit
                  </button>
                </div>
              )}
            </div>
          )}
          {authState === 'success' && (
            <div style={{ fontSize: 13, color: 'var(--green)', marginTop: 4 }}>
              {authMsg}
            </div>
          )}
          {authState === 'error' && (
            <div>
              <div style={{ fontSize: 13, color: 'var(--red)', marginTop: 4 }}>{authMsg}</div>
              <button className="btn btn-primary" style={{ marginTop: 6 }} onClick={handleLogin}>
                Retry
              </button>
            </div>
          )}
        </div>
      );
    }

    // ── App ──
    function App() {
      const [agents, setAgents] = useState(loadAgents);
      const [activeId, setActiveId] = useState(null);
      const [chats, setChats] = useState(loadChats);
      const [statuses, setStatuses] = useState({});
      const [showSettings, setShowSettings] = useState(false);
      const [editAgent, setEditAgent] = useState(null);
      const [theme, setTheme] = useState('dark');

      const activeAgent = agents.find(a => a.id === activeId);

      useEffect(() => { saveAgents(agents); }, [agents]);
      useEffect(() => { saveChats(chats); }, [chats]);

      // Sync theme with macOS system appearance
      useEffect(() => {
        window.agentHub.getSystemTheme().then(isDark => {
          setTheme(isDark ? 'dark' : 'light');
        });
        window.agentHub.onThemeChange(isDark => {
          setTheme(isDark ? 'dark' : 'light');
        });
        return () => window.agentHub.removeStreamListeners?.();
      }, []);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.className = theme === 'light' ? 'light-theme' : '';
        document.body.style.background = theme === 'light' ? '#f4f4f8' : '#09090f';
        document.body.style.color = theme === 'light' ? '#16162a' : '#eeeef4';
      }, [theme]);

      // Ping all agents on load
      useEffect(() => {
        agents.forEach(agent => {
          setStatuses(s => ({ ...s, [agent.id]: 'checking' }));
          window.agentHub.ping(agent).then(res => {
            setStatuses(s => ({ ...s, [agent.id]: res.online ? 'online' : 'offline' }));
          });
        });
      }, [agents.length]);

      const updateAgent = (updated) => {
        setAgents(prev => {
          const exists = prev.some(a => a.id === updated.id);
          if (exists) return prev.map(a => a.id === updated.id ? updated : a);
          return [...prev, updated];
        });
        setEditAgent(null);
      };

      const addAgent = () => {
        setEditAgent(null);
        setShowSettings(true);
        // The modal will show presets view when editAgent is null and user clicks "+ Add Agent"
      };

      const removeAgent = (id) => {
        setAgents(prev => prev.filter(a => a.id !== id));
        setChats(prev => { const next = { ...prev }; delete next[id]; return next; });
        if (activeId === id) setActiveId(null);
        setEditAgent(null);
      };

      const onlineCount = Object.values(statuses).filter(s => s === 'online').length;

      return (
        <>
          <div className="titlebar">
            <div className="titlebar-dot" />
            <span className="titlebar-title">AGENT HUB</span>
            <div style={{ flex: 1 }} />
            {/* Theme follows macOS system appearance */}
          </div>
          <div className="app-body">
            <Sidebar
              agents={agents}
              activeId={activeId}
              statuses={statuses}
              onSelect={setActiveId}
              onAdd={addAgent}
              onOpenSettings={() => setShowSettings(true)}
            />
            <div className="main-area">
              {activeAgent ? (
                <ChatView
                  agent={activeAgent}
                  status={statuses[activeAgent.id]}
                  messages={chats[activeAgent.id] || []}
                  setMessages={(msgs) => setChats(prev => ({ ...prev, [activeAgent.id]: typeof msgs === 'function' ? msgs(prev[activeAgent.id] || []) : msgs }))}
                  onUpdateAgent={updateAgent}
                />
              ) : (
                <Dashboard agents={agents} statuses={statuses} onlineCount={onlineCount} />
              )}
            </div>
          </div>

          {showSettings && (
            <SettingsModal
              agents={agents}
              editAgent={editAgent}
              setEditAgent={setEditAgent}
              onUpdate={updateAgent}
              onRemove={removeAgent}
              onAdd={addAgent}
              onClose={() => { setShowSettings(false); setEditAgent(null); }}
            />
          )}
        </>
      );
    }

    // ── Sidebar ──
    function Sidebar({ agents, activeId, statuses, onSelect, onAdd, onOpenSettings }) {
      return (
        <div className="sidebar">
          <div className="sidebar-header">
            <h2>Agents</h2>
            <button className="btn-icon" onClick={onAdd} title="Add agent">+</button>
          </div>
          <div className="agent-list">
            {agents.length === 0 && <div className="empty-list">No agents yet. Click + to add one.</div>}
            {agents.map(agent => (
              <div
                key={agent.id}
                className={`agent-card ${activeId === agent.id ? 'active' : ''}`}
                onClick={() => onSelect(agent.id)}
              >
                <div className="agent-card-header">
                  <div className={`agent-avatar ${agent.providerClass}`}>
                    {agent.emoji}
                  </div>
                  <div className="agent-info">
                    <div className="agent-name">{agent.name}</div>
                    <div className="agent-provider">
                      {agent.provider === 'claude-code' ? 'Claude Code' : agent.provider === 'openclaw-local' ? 'OpenClaw Local' : agent.provider === 'openclaw' ? 'OpenClaw SSH' : agent.provider === 'hermes-local' ? 'Hermes Local' : agent.provider === 'hermes' ? 'Hermes SSH' : agent.provider === 'codex' ? 'Codex' : agent.provider === 'openai-compat' ? 'OpenAI Compat' : agent.provider}
                      {agent.model ? ` / ${agent.model}` : ''}
                    </div>
                  </div>
                  <div className={`status-dot ${statuses[agent.id] || 'offline'}`} />
                </div>
              </div>
            ))}
          </div>
          <div className="sidebar-footer">
            <button className="btn-settings" onClick={onOpenSettings}>
              <span style={{ fontSize: '14px' }}>&#9881;</span> Settings
            </button>
          </div>
        </div>
      );
    }

    // ── Dashboard ──
    function Dashboard({ agents, statuses, onlineCount }) {
      return (
        <div className="dashboard">
          <div className="dash-logo">AH</div>
          <div className="dash-title">Agent Hub</div>
          <div className="dash-sub">
            Your unified command center for AI agents. Select one from the sidebar to start chatting, or add a new one.
          </div>
          <div className="dash-grid">
            <div className="dash-stat">
              <div className="dash-stat-num" style={{ color: 'var(--accent)' }}>{agents.length}</div>
              <div className="dash-stat-label">Total Agents</div>
            </div>
            <div className="dash-stat">
              <div className="dash-stat-num" style={{ color: 'var(--green)' }}>{onlineCount}</div>
              <div className="dash-stat-label">Online</div>
            </div>
            <div className="dash-stat">
              <div className="dash-stat-num" style={{ color: agents.length - onlineCount > 0 ? 'var(--red)' : 'var(--text-2)' }}>{agents.length - onlineCount}</div>
              <div className="dash-stat-label">Offline</div>
            </div>
          </div>
        </div>
      );
    }

    // ── Chat View ──
    function ThinkingBlock({ thinking }) {
      const [open, setOpen] = useState(false);
      if (!thinking) return null;
      return (
        <div className="thinking-block">
          <button className="thinking-toggle" onClick={() => setOpen(!open)}>
            <span className="thinking-icon">{open ? '▾' : '▸'}</span>
            <span>Thinking</span>
          </button>
          {open && (
            <div className="thinking-content">{thinking}</div>
          )}
        </div>
      );
    }

    function ChatView({ agent, status, messages, setMessages, onUpdateAgent }) {
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [streamText, setStreamText] = useState('');
      const [slashCommands, setSlashCommands] = useState([]);
      const [showSlash, setShowSlash] = useState(false);
      const [slashIdx, setSlashIdx] = useState(0);
      const bottomRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, streamText]);

      useEffect(() => {
        inputRef.current?.focus();
      }, [agent.id]);

      // Load slash commands for this provider
      useEffect(() => {
        window.agentHub.getSlashCommands(agent.provider).then(cmds => {
          setSlashCommands(cmds || []);
        });
      }, [agent.provider]);

      // Filter slash commands based on input
      const filteredCommands = React.useMemo(() => {
        if (!input.startsWith('/')) return [];
        const query = input.toLowerCase();
        return slashCommands.filter(c => c.name.toLowerCase().startsWith(query) || query === '/');
      }, [input, slashCommands]);

      useEffect(() => {
        setShowSlash(input.startsWith('/') && filteredCommands.length > 0 && !loading);
        setSlashIdx(0);
      }, [input, filteredCommands.length, loading]);

      const loadingRef = useRef(false);

      const executeSlashCommand = async (command) => {
        const cmd = command.trim();
        setInput('');
        if (inputRef.current) inputRef.current.style.height = 'auto';
        setShowSlash(false);

        // /clear is always local
        if (cmd === '/clear') {
          setMessages([]);
          setMessages(prev => [...prev, { role: 'system', content: 'Chat history cleared.' }]);
          // Reset Claude Code session so next message starts a fresh conversation
          if (agent.sessionId && onUpdateAgent) {
            onUpdateAgent({ ...agent, sessionId: null });
          }
          return;
        }

        // /status is always local
        if (cmd === '/status') {
          const res = await window.agentHub.ping(agent);
          setMessages(prev => [...prev, { role: 'system', content: res.online ? `Status: Online\n${res.info || ''}` : `Status: Offline\n${res.error || ''}` }]);
          return;
        }

        // All other slash commands go to backend
        loadingRef.current = true;
        setLoading(true);
        setMessages(prev => [...prev, { role: 'user', content: cmd }]);

        try {
          const res = await window.agentHub.execSlash(agent, cmd);
          if (res.local) {
            // Shouldn't get here since we handle local above, but just in case
            setMessages(prev => [...prev, { role: 'system', content: `${res.command} executed` }]);
          } else if (res.error) {
            setMessages(prev => [...prev, { role: 'error', content: res.error }]);
          } else if (res.content) {
            setMessages(prev => [...prev, { role: 'system', content: res.content }]);
          }
        } catch (err) {
          setMessages(prev => [...prev, { role: 'error', content: err.message || 'Command failed' }]);
        } finally {
          loadingRef.current = false;
          setLoading(false);
        }
      };

      const sendMessage = async () => {
        const text = input.trim();
        if (!text || loadingRef.current) return;

        // If it's a slash command, route it
        if (text.startsWith('/')) {
          await executeSlashCommand(text);
          return;
        }

        loadingRef.current = true;
        setLoading(true);

        const userMsg = { role: 'user', content: text };
        setMessages(prev => [...prev, userMsg]);
        setInput('');
        if (inputRef.current) inputRef.current.style.height = 'auto';

        const apiMessages = [];
        if (agent.systemPrompt) apiMessages.push({ role: 'system', content: agent.systemPrompt });
        const allMsgs = [...(messages || []), userMsg];
        apiMessages.push(...allMsgs.slice(-20));

        try {
          const res = await window.agentHub.chat(agent, apiMessages);
          if (res.error) {
            setMessages(prev => [...prev, { role: 'error', content: res.error }]);
          } else if (res.content) {
            const msg = { role: 'assistant', content: res.content };
            if (res.thinking) msg.thinking = res.thinking;
            setMessages(prev => [...prev, msg]);
          }
          // Persist Claude Code session ID for conversation continuity
          if (res.sessionId && !agent.sessionId && onUpdateAgent) {
            onUpdateAgent({ ...agent, sessionId: res.sessionId });
          }
        } catch (err) {
          setMessages(prev => [...prev, { role: 'error', content: err.message || 'Something went wrong' }]);
        } finally {
          loadingRef.current = false;
          setLoading(false);
        }
      };

      const onKeyDown = (e) => {
        if (showSlash) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            setSlashIdx(i => Math.min(i + 1, filteredCommands.length - 1));
            return;
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            setSlashIdx(i => Math.max(i - 1, 0));
            return;
          }
          if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) {
            e.preventDefault();
            const selected = filteredCommands[slashIdx];
            if (selected) {
              // If it's just "/" autocomplete the command name, otherwise execute
              if (input === '/' || !input.includes(' ')) {
                setInput(selected.name + ' ');
              } else {
                executeSlashCommand(input);
              }
            }
            return;
          }
          if (e.key === 'Escape') {
            setShowSlash(false);
            return;
          }
        }
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      return (
        <>
          <div className="chat-header">
            <div className={`agent-avatar ${agent.providerClass}`} style={{ width: 34, height: 34, fontSize: 12 }}>
              {agent.emoji}
            </div>
            <div style={{ flex: 1 }}>
              <div className="agent-name">{agent.name}</div>
              <div className="agent-provider" style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 6 }}>
                <span className={`status-dot ${status || 'offline'}`} style={{ width: 6, height: 6 }} />
                {status === 'online' ? 'Connected' : status === 'checking' ? 'Checking...' : 'Disconnected'}
              </div>
            </div>
          </div>

          <div className="chat-messages">
            {messages.length === 0 && !loading && (
              <div className="chat-empty">
                <div className="chat-empty-icon">
                  <div className={`agent-avatar ${agent.providerClass}`} style={{ width: 36, height: 36, fontSize: 12 }}>
                    {agent.emoji}
                  </div>
                </div>
                <div className="chat-empty-title">Start a conversation with {agent.name}</div>
                <div className="chat-empty-hint">
                  Press <span className="chat-empty-kbd">/</span> to see available commands
                </div>
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`msg ${msg.role}`}>
                {msg.thinking && (
                  <ThinkingBlock thinking={msg.thinking} />
                )}
                {msg.content}
                {msg.role === 'error' && (msg.content.includes('not authenticated') || msg.content.includes('OAuth') || msg.content.includes('auth') || msg.content.includes('setup')) && (
                  <AuthLoginButton agent={agent} onSuccess={() => {
                    setMessages(prev => [...prev, { role: 'system', content: 'Authenticated! You can now send messages.' }]);
                  }} />
                )}
              </div>
            ))}
            {loading && streamText && (
              <div className="msg assistant">{streamText}</div>
            )}
            {loading && !streamText && (
              <div className="typing-indicator">
                <span /><span /><span />
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          <div className="chat-input-bar">
            {showSlash && (
              <div className="slash-palette">
                {filteredCommands.map((cmd, i) => (
                  <div
                    key={cmd.name}
                    className={`slash-palette-item ${i === slashIdx ? 'selected' : ''}`}
                    onClick={() => { setInput(cmd.name + ' '); inputRef.current?.focus(); }}
                    onDoubleClick={() => executeSlashCommand(cmd.name)}
                  >
                    <span className="slash-palette-item-name">{cmd.name}</span>
                    <span className="slash-palette-item-desc">{cmd.desc}</span>
                  </div>
                ))}
              </div>
            )}
            <div className="chat-input-wrap">
              <textarea
                ref={inputRef}
                className="chat-input"
                rows={1}
                placeholder={`Message ${agent.name}... (type / for commands)`}
                value={input}
                onChange={e => {
                  setInput(e.target.value);
                  const el = e.target;
                  el.style.height = 'auto';
                  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
                }}
                onKeyDown={onKeyDown}
              />
              <button className="btn-send" onClick={sendMessage} disabled={loading || !input.trim()}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3l5 5h-3.5v5h-3V8H3l5-5z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
        </>
      );
    }

    // ── Agent Presets ──
    const PRESETS = [
      { name: 'Claude Code (Local)', emoji: 'CC', provider: 'claude-code', model: '', workDir: '', providerClass: 'provider-claude-code', desc: 'Local Claude Code CLI instance' },
      { name: 'OpenClaw (Local)', emoji: 'OC', provider: 'openclaw-local', model: '', providerClass: 'provider-openclaws', desc: 'Local OpenClaw CLI instance' },
      { name: 'OpenClaw (SSH)', emoji: 'OC', provider: 'openclaw', sshHost: '', sshUser: 'root', model: '', providerClass: 'provider-openclaws', desc: 'OpenClaw on a remote VPS' },
      { name: 'Hermes (Local)', emoji: 'H', provider: 'hermes-local', model: '', providerClass: 'provider-hermes', desc: 'Local Hermes Agent instance' },
      { name: 'Hermes (SSH)', emoji: 'H', provider: 'hermes', sshHost: '', sshUser: 'root', model: '', providerClass: 'provider-hermes', desc: 'Hermes on a remote VPS' },
      { name: 'Codex (Local)', emoji: 'CX', provider: 'codex', model: '', providerClass: 'provider-codex', desc: 'Local OpenAI Codex CLI agent' },
      { name: 'Ollama (Local)', emoji: 'OL', provider: 'openai-compat', baseUrl: 'http://localhost:11434', model: 'llama3', providerClass: 'provider-generic', desc: 'Local Ollama instance' },
    ];

    // ── Settings Modal ──
    function SettingsModal({ agents, editAgent, setEditAgent, onUpdate, onRemove, onAdd, onClose }) {
      const [form, setForm] = useState(editAgent || {});
      const [testStatus, setTestStatus] = useState(null); // null | 'testing' | {ok, msg}
      const [showPresets, setShowPresets] = useState(false);

      useEffect(() => {
        if (editAgent) { setForm({ ...editAgent }); setTestStatus(null); }
      }, [editAgent]);

      const providerClasses = {
        'claude-code': 'provider-claude-code',
        'openclaw': 'provider-openclaws',
        'hermes': 'provider-hermes',
        'openai-compat': 'provider-generic',
        'openai': 'provider-openai',
        'codex': 'provider-codex',
      };

      const handleSave = () => {
        const updated = { ...form, providerClass: providerClasses[form.provider] || 'provider-generic' };
        onUpdate(updated);
      };

      const handleTest = async () => {
        setTestStatus('testing');
        const testAgent = { ...form, providerClass: providerClasses[form.provider] || 'provider-generic' };
        try {
          const res = await window.agentHub.ping(testAgent);
          if (res.online) {
            setTestStatus({ ok: true, msg: 'Connected successfully!' });
          } else {
            setTestStatus({ ok: false, msg: res.error || 'Could not reach agent. Check the URL and make sure it\'s running.' });
          }
        } catch (err) {
          setTestStatus({ ok: false, msg: err.message || 'Connection failed' });
        }
      };

      const handlePreset = (preset) => {
        const newAgent = {
          id: `agent-${Date.now()}`,
          name: preset.name,
          provider: preset.provider,
          baseUrl: preset.baseUrl,
          apiKey: '',
          model: preset.model,
          emoji: preset.emoji,
          providerClass: preset.providerClass,
          systemPrompt: '',
          maxTokens: 16384,
        };
        setForm(newAgent);
        setShowPresets(false);
        // We set editAgent via the parent after saving, but we need to show the form now
        // So we'll treat this as editing a new unsaved agent
        setEditAgent(newAgent);
      };

      return (
        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal">
            <h2>{editAgent ? (agents.find(a => a.id === editAgent.id) ? 'Edit Agent' : 'Add Agent') : 'Agent Settings'}</h2>

            {!editAgent && !showPresets ? (
              <>
                {agents.map(agent => (
                  <div
                    key={agent.id}
                    className="settings-agent-card"
                    onClick={() => setEditAgent(agent)}
                  >
                    <div className={`agent-avatar ${agent.providerClass}`} style={{ width: 32, height: 32, fontSize: 12 }}>
                      {agent.emoji}
                    </div>
                    <div className="agent-info">
                      <div className="agent-name">{agent.name}</div>
                      <div className="agent-provider">{agent.provider}</div>
                    </div>
                    <span className="edit-arrow">Edit &rarr;</span>
                  </div>
                ))}
                <div className="form-actions" style={{ justifyContent: 'space-between' }}>
                  <button className="btn btn-primary" onClick={() => setShowPresets(true)}>+ Add Agent</button>
                  <button className="btn btn-ghost" onClick={onClose}>Close</button>
                </div>
              </>
            ) : showPresets && !editAgent ? (
              <>
                <p style={{ fontSize: 13, color: 'var(--text-2)', marginBottom: 12 }}>Choose a starting template:</p>
                <div className="presets-grid">
                  {PRESETS.map((p, i) => (
                    <div key={i} className="preset-card" onClick={() => handlePreset(p)}>
                      <div className="preset-card-icon">{p.emoji}</div>
                      <div className="preset-card-name">{p.name}</div>
                      <div className="preset-card-desc">{p.desc}</div>
                    </div>
                  ))}
                </div>
                <div className="form-actions">
                  <button className="btn btn-ghost" onClick={() => setShowPresets(false)}>Back</button>
                </div>
              </>
            ) : (
              <>
                <h3>Connection</h3>
                <div className="form-row">
                  <label>Name</label>
                  <input value={form.name || ''} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
                </div>
                <div className="form-row">
                  <label>Display Emoji / Initials</label>
                  <input value={form.emoji || ''} onChange={e => setForm(f => ({ ...f, emoji: e.target.value }))} maxLength={3} />
                </div>
                <div className="form-row">
                  <label>Provider</label>
                  <select value={form.provider || ''} onChange={e => setForm(f => ({ ...f, provider: e.target.value }))}>
                    <option value="claude-code">Claude Code (Local)</option>
                    <option value="openclaw-local">OpenClaw (Local)</option>
                    <option value="openclaw">OpenClaw (SSH)</option>
                    <option value="hermes-local">Hermes (Local)</option>
                    <option value="hermes">Hermes (SSH)</option>
                    <option value="codex">Codex (Local)</option>
                    <option value="openai-compat">OpenAI Compatible (Ollama, vLLM, etc.)</option>
                  </select>
                </div>

                {form.provider === 'claude-code' && (
                  <>
                    <div className="form-row">
                      <label>Working Directory</label>
                      <input value={form.workDir || ''} onChange={e => setForm(f => ({ ...f, workDir: e.target.value }))} placeholder="e.g. ~/projects/myapp (blank = home dir)" />
                      <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 4 }}>
                        Each instance can target a different project folder
                      </div>
                    </div>
                    <div className="form-row">
                      <label>Model (optional)</label>
                      <input value={form.model || ''} onChange={e => setForm(f => ({ ...f, model: e.target.value }))} placeholder="e.g. claude-sonnet-4-20250514, claude-opus-4-20250514" />
                    </div>
                    <div className="form-row">
                      <label>Claude binary path (optional)</label>
                      <input value={form.claudePath || ''} onChange={e => setForm(f => ({ ...f, claudePath: e.target.value }))} placeholder="claude (default, uses PATH)" />
                    </div>
                    <div className="form-row">
                      <label>Extra CLI args (optional)</label>
                      <input value={form.claudeArgs || ''} onChange={e => setForm(f => ({ ...f, claudeArgs: e.target.value }))} placeholder="e.g. --permission-mode full --verbose" />
                    </div>
                    <div className="form-row">
                      <label style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <input type="checkbox" checked={form.continueSession || false} onChange={e => setForm(f => ({ ...f, continueSession: e.target.checked }))} style={{ width: 'auto' }} />
                        Continue most recent session (--continue)
                      </label>
                    </div>
                    <div className="form-row">
                      <label style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <input type="checkbox" checked={form.showThinking || false} onChange={e => setForm(f => ({ ...f, showThinking: e.target.checked }))} style={{ width: 'auto' }} />
                        Show Thinking
                      </label>
                      <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 4 }}>
                        Display the model's internal reasoning before its answer
                      </div>
                    </div>
                    <div className="form-row">
                      <label>Timeout (seconds)</label>
                      <input type="number" value={(form.timeout || 300000) / 1000} onChange={e => setForm(f => ({ ...f, timeout: (parseInt(e.target.value) || 300) * 1000 }))} placeholder="300" />
                    </div>
                  </>
                )}

                {form.provider === 'codex' && (
                  <>
                    <div className="form-row">
                      <label>Working Directory</label>
                      <input value={form.workDir || ''} onChange={e => setForm(f => ({ ...f, workDir: e.target.value }))} placeholder="e.g. ~/projects/myapp (blank = home dir)" />
                    </div>
                    <div className="form-row">
                      <label>Model (optional)</label>
                      <input value={form.model || ''} onChange={e => setForm(f => ({ ...f, model: e.target.value }))} placeholder="e.g. o3, o4-mini, gpt-4.1" />
                    </div>
                    <div className="form-row">
                      <label>Codex binary path (optional)</label>
                      <input value={form.codexPath || ''} onChange={e => setForm(f => ({ ...f, codexPath: e.target.value }))} placeholder="codex (default, uses PATH)" />
                    </div>
                    <div className="form-row">
                      <label>Extra CLI args (optional)</label>
                      <input value={form.codexArgs || ''} onChange={e => setForm(f => ({ ...f, codexArgs: e.target.value }))} placeholder="e.g. --full-auto" />
                    </div>
                    <div className="form-row">
                      <label>Timeout (seconds)</label>
                      <input type="number" value={(form.timeout || 300000) / 1000} onChange={e => setForm(f => ({ ...f, timeout: (parseInt(e.target.value) || 300) * 1000 }))} placeholder="300" />
                    </div>
                  </>
                )}

                {form.provider === 'openclaw-local' && (
                  <>
                    <div className="form-row">
                      <label>Working Directory (optional)</label>
                      <input value={form.workDir || ''} onChange={e => setForm(f => ({ ...f, workDir: e.target.value }))} placeholder="e.g. ~/projects/myapp (blank = home dir)" />
                    </div>
                    <div className="form-row">
                      <label>Agent ID (optional, uses default if blank)</label>
                      <input value={form.openclawAgent || ''} onChange={e => setForm(f => ({ ...f, openclawAgent: e.target.value }))} placeholder="e.g. main, ops, coding" />
                    </div>
                    <div className="form-row">
                      <label>Model (optional)</label>
                      <input value={form.model || ''} onChange={e => setForm(f => ({ ...f, model: e.target.value }))} placeholder="Uses OpenClaw default" />
                    </div>
                  </>
                )}

                {form.provider === 'hermes-local' && (
                  <>
                    <div className="form-row">
                      <label>Working Directory (optional)</label>
                      <input value={form.workDir || ''} onChange={e => setForm(f => ({ ...f, workDir: e.target.value }))} placeholder="e.g. ~/projects/myapp (blank = home dir)" />
                    </div>
                    <div className="form-row">
                      <label>Model (optional)</label>
                      <input value={form.model || ''} onChange={e => setForm(f => ({ ...f, model: e.target.value }))} placeholder="Uses Hermes default" />
                    </div>
                    <div className="form-row">
                      <label>Provider override (optional, e.g. openai, anthropic, ollama)</label>
                      <input value={form.hermesProvider || ''} onChange={e => setForm(f => ({ ...f, hermesProvider: e.target.value }))} placeholder="Leave blank for default" />
                    </div>
                    <div className="form-row">
                      <label>Worktree path (optional)</label>
                      <input value={form.hermesWorktree || ''} onChange={e => setForm(f => ({ ...f, hermesWorktree: e.target.value }))} placeholder="e.g. /home/user/projects/myapp" />
                    </div>
                  </>
                )}

                {form.provider === 'openclaw' && (
                  <>
                    <div className="form-row">
                      <label>SSH Host</label>
                      <input value={form.sshHost || ''} onChange={e => setForm(f => ({ ...f, sshHost: e.target.value }))} placeholder="157.180.23.7" />
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <div className="form-row" style={{ flex: 1 }}>
                        <label>SSH User</label>
                        <input value={form.sshUser || ''} onChange={e => setForm(f => ({ ...f, sshUser: e.target.value }))} placeholder="root" />
                      </div>
                      <div className="form-row" style={{ flex: 1 }}>
                        <label>SSH Port</label>
                        <input type="number" value={form.sshPort || 22} onChange={e => setForm(f => ({ ...f, sshPort: parseInt(e.target.value) || 22 }))} />
                      </div>
                    </div>
                    <div className="form-row">
                      <label>SSH Key Path (optional, uses default if blank)</label>
                      <input value={form.sshKey || ''} onChange={e => setForm(f => ({ ...f, sshKey: e.target.value }))} placeholder="~/.ssh/id_rsa" />
                    </div>
                    <div className="form-row">
                      <label>Gateway Token</label>
                      <input type="password" value={form.apiKey || ''} onChange={e => setForm(f => ({ ...f, apiKey: e.target.value }))} placeholder="Your OpenClaw gateway token" />
                    </div>
                    <div className="form-row">
                      <label>Agent ID (optional, uses default agent if blank)</label>
                      <input value={form.openclawAgent || ''} onChange={e => setForm(f => ({ ...f, openclawAgent: e.target.value }))} placeholder="e.g. ops, main, coding" />
                    </div>
                  </>
                )}

                {form.provider === 'hermes' && (
                  <>
                    <div className="form-row">
                      <label>SSH Host</label>
                      <input value={form.sshHost || ''} onChange={e => setForm(f => ({ ...f, sshHost: e.target.value }))} placeholder="your-vps-ip" />
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <div className="form-row" style={{ flex: 1 }}>
                        <label>SSH User</label>
                        <input value={form.sshUser || ''} onChange={e => setForm(f => ({ ...f, sshUser: e.target.value }))} placeholder="root" />
                      </div>
                      <div className="form-row" style={{ flex: 1 }}>
                        <label>SSH Port</label>
                        <input type="number" value={form.sshPort || 22} onChange={e => setForm(f => ({ ...f, sshPort: parseInt(e.target.value) || 22 }))} />
                      </div>
                    </div>
                    <div className="form-row">
                      <label>SSH Key Path (optional)</label>
                      <input value={form.sshKey || ''} onChange={e => setForm(f => ({ ...f, sshKey: e.target.value }))} placeholder="~/.ssh/id_rsa" />
                    </div>
                    <div className="form-row">
                      <label>Model (optional, uses Hermes default if blank)</label>
                      <input value={form.model || ''} onChange={e => setForm(f => ({ ...f, model: e.target.value }))} placeholder="e.g. nous-hermes-3, gpt-4, etc." />
                    </div>
                    <div className="form-row">
                      <label>Provider override (optional, e.g. openai, anthropic, ollama)</label>
                      <input value={form.hermesProvider || ''} onChange={e => setForm(f => ({ ...f, hermesProvider: e.target.value }))} placeholder="Leave blank for Hermes default" />
                    </div>
                    <div className="form-row">
                      <label>Worktree / workspace path (optional)</label>
                      <input value={form.hermesWorktree || ''} onChange={e => setForm(f => ({ ...f, hermesWorktree: e.target.value }))} placeholder="e.g. /root/projects/myapp" />
                    </div>
                  </>
                )}

                {form.provider === 'openai-compat' && (
                  <>
                    <div className="form-row">
                      <label>Base URL (no trailing slash)</label>
                      <input value={form.baseUrl || ''} onChange={e => setForm(f => ({ ...f, baseUrl: e.target.value }))} placeholder="http://localhost:11434" />
                      <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 4 }}>
                        Common ports: 11434 (Ollama), 8000 (vLLM), 8080, 3000
                      </div>
                    </div>
                    <div className="form-row">
                      <label>API Key (optional for self-hosted)</label>
                      <input type="password" value={form.apiKey || ''} onChange={e => setForm(f => ({ ...f, apiKey: e.target.value }))} placeholder="Leave blank if none required" />
                    </div>
                    <div className="form-row">
                      <label>Model</label>
                      <input value={form.model || ''} onChange={e => setForm(f => ({ ...f, model: e.target.value }))} placeholder="e.g. gpt-4, llama3, etc." />
                    </div>
                  </>
                )}

                <h3>Test Connection</h3>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <button className="btn btn-test" onClick={handleTest} disabled={testStatus === 'testing'}>
                    {testStatus === 'testing' ? 'Testing...' : 'Test Connection'}
                  </button>
                </div>
                {testStatus && testStatus !== 'testing' && (
                  <div className={`test-result ${testStatus.ok ? 'success' : 'failure'}`}>
                    {testStatus.ok ? '✓ ' : '✗ '}{testStatus.msg}
                  </div>
                )}
                {testStatus === 'testing' && (
                  <div className="test-result testing">Connecting...</div>
                )}

                <h3>Behavior</h3>
                <div className="form-row">
                  <label>System Prompt</label>
                  <input value={form.systemPrompt || ''} onChange={e => setForm(f => ({ ...f, systemPrompt: e.target.value }))} placeholder="You are a helpful assistant." />
                </div>
                <div className="form-row">
                  <label>Max Tokens</label>
                  <input type="number" value={form.maxTokens || 4096} onChange={e => setForm(f => ({ ...f, maxTokens: parseInt(e.target.value) || 16384 }))} />
                </div>
                {form.provider === 'openai-compat' && (
                  <div className="form-row">
                    <label style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <input type="checkbox" checked={form.showThinking || false} onChange={e => setForm(f => ({ ...f, showThinking: e.target.checked }))} style={{ width: 'auto' }} />
                      Show Thinking
                    </label>
                    <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 4 }}>
                      Show reasoning content if the model supports it
                    </div>
                  </div>
                )}

                <div className="form-actions" style={{ justifyContent: 'space-between' }}>
                  {agents.find(a => a.id === form.id) ? (
                    <button className="btn btn-danger" onClick={() => { if (confirm('Remove this agent?')) onRemove(form.id); }}>Remove</button>
                  ) : <div />}
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button className="btn btn-ghost" onClick={() => { setEditAgent(null); setShowPresets(false); }}>Back</button>
                    <button className="btn btn-primary" onClick={handleSave}>Save</button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
