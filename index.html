          // Update last activity time for this agent
          if (setLastActivityTime) {
            setLastActivityTime(prev => ({ ...prev, [agentRef.current.id]: Date.now() }));
          }
          // Persist resumable agent session IDs — use ref for latest agent
          const currentAgent = agentRef.current;
          if (meta?.sessionId && currentAgent.sessionId !== meta.sessionId && onUpdateAgent) {
            onUpdateAgent({ ...currentAgent, sessionId: meta.sessionId });
          }

          streamTextRef.current = '';
          streamThinkingRef.current = '';
          toolUsesRef.current = [];
          activeRequestIdRef.current = null;
          setStreamText('');
          setStreamThinking('');
          setToolUses([]);
          setPermRequests([]);
          setResolvedPerms({});
          setLoading(false);
        });

        const offError = window.agentHub.onStreamError((id, err) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          setMessages(prev => [...prev, { role: 'error', content: err || 'Something went wrong' }]);
          streamTextRef.current = '';
          streamThinkingRef.current = '';
          toolUsesRef.current = [];
          activeRequestIdRef.current = null;
          setStreamText('');
          setStreamThinking('');
          setToolUses([]);
          setPermRequests([]);
          setResolvedPerms({});
          setLoading(false);
        });

        const offToolUse = window.agentHub.onStreamToolUse((id, toolInfo) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          toolUsesRef.current = [...toolUsesRef.current, toolInfo];
          setToolUses([...toolUsesRef.current]);
        });

        const offPermDenied = window.agentHub.onPermissionDenied((id, denials) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          setPermDenials(denials);
        });

        const offPermRequest = window.agentHub.onPermissionRequest((id, request) => {
          if (cancelled || id !== activeRequestIdRef.current) return;

          // Auto-approve if this tool is in the "always allow" set
          if (alwaysAllowedToolsRef.current.has(request.tool)) {
            window.agentHub.sendPermissionResponse(id, request.toolUseId, {
              behavior: 'allow',
              updatedInput: request.input,
            });
            setPermRequests(prev => [...prev, { ...request, requestId: id }]);
            setResolvedPerms(prev => ({ ...prev, [request.toolUseId]: 'approved' }));
            return;
          }

          setPermRequests(prev => [...prev, { ...request, requestId: id }]);

          // Increment completion status if user is NOT viewing this agent
          // This shows the notification badge for pending permission requests
          if (!isActiveRef.current) {
            setCompletionStatus(prev => {
              const current = typeof prev === 'number' ? prev : 0;
              return current + 1;
            });
          }

          // Always play notification sound for permission requests
          const audio = document.getElementById('notificationSound');
          if (audio) {
            audio.volume = 1.0; // Ensure volume is at max
            audio.currentTime = 0; // Reset to beginning
            const playPromise = audio.play();
            if (playPromise !== undefined) {
              playPromise.then(() => {
                console.log('Notification sound played successfully for completion');
              }).catch(err => {
                console.error('Notification sound play failed:', err);
                // Try alternative approach for Electron
                try {
                  audio.load();
                  audio.play();
                } catch(e) {
                  console.error('Alternative play method also failed:', e);
                }
              });
            }
          } else {
            console.error('Notification audio element not found');
          }
        });

        return () => {
          cancelled = true;
          offChunk();
          offThinking();
          offDone();
          offError();
          offToolUse();
          offPermDenied();
          offPermRequest();
        };
      }, [agent.id]);

      // Discover slash commands dynamically from the CLI tool
      useEffect(() => {
        // Start with cached/local commands immediately
        window.agentHub.getSlashCommands(agent.provider).then(cmds => {
          setSlashCommands(cmds || []);
        });
        // Then discover full commands from the CLI in the background
        window.agentHub.discoverSlashCommands(agent).then(cmds => {
          if (cmds && cmds.length > 0) setSlashCommands(cmds);
        }).catch(() => {}); // silently fall back to cached
      }, [agent.provider, agent.id]);

      // Filter slash commands based on input
      const filteredCommands = React.useMemo(() => {
        if (!input.startsWith('/')) return [];
        const query = input.toLowerCase();
        return slashCommands.filter(c => c.name.toLowerCase().startsWith(query) || query === '/');
      }, [input, slashCommands]);

      useEffect(() => {
        setShowSlash(input.startsWith('/') && filteredCommands.length > 0 && !loading);
        setSlashIdx(0);
      }, [input, filteredCommands.length, loading]);

      // Call onLoadingChange when loading state changes
      useEffect(() => {
        if (onLoadingChange) {
          onLoadingChange(loading);
        }
      }, [loading, onLoadingChange]);

      const loadingRef = useRef(false);

      const executeSlashCommand = async (command) => {
        const cmd = command.trim();
        setInput('');
        if (inputRef.current) inputRef.current.style.height = 'auto';
        setShowSlash(false);

        // /clear is always local
        if (cmd === '/clear') {
          setMessages([]);
          setMessages(prev => [...prev, { role: 'system', content: 'Chat history cleared.' }]);
          // Reset Claude Code session so next message starts a fresh conversation
          if (agent.sessionId && onUpdateAgent) {
            onUpdateAgent({ ...agent, sessionId: null });
          }
          return;
        }

        // /status is always local
        if (cmd === '/status') {
          const res = await window.agentHub.ping(agent);
          setMessages(prev => [...prev, { role: 'system', content: res.online ? `Status: Online\n${res.info || ''}` : `Status: Offline\n${res.error || ''}` }]);
          return;
        }

        // All other slash commands go to backend
        loadingRef.current = true;
        setLoading(true);
        setMessages(prev => [...prev, { role: 'user', content: cmd }]);

        try {
          const res = await window.agentHub.execSlash(agent, cmd);
          if (res.local) {
            setMessages(prev => [...prev, { role: 'system', content: `${res.command} executed` }]);
          } else if (res.error) {
            setMessages(prev => [...prev, { role: 'error', content: res.error }]);
          } else if (res.content) {
            // Use 'assistant' role for actual agent responses from slash commands
            setMessages(prev => [...prev, { role: 'assistant', content: res.content }]);
          }
        } catch (err) {
          setMessages(prev => [...prev, { role: 'error', content: err.message || 'Command failed' }]);
        } finally {
          loadingRef.current = false;
          setLoading(false);
        }
      };

      // Build agent config with session-allowed tools merged in
      const buildAgentWithSessionTools = (baseAgent, extraTools) => {
        const all = extraTools || sessionAllowedTools;
        if (!all.length) return baseAgent;
        const existing = (baseAgent.allowedTools || '').split(/[,\s]+/).filter(Boolean);
        const merged = [...new Set([...existing, ...all])].join(' ');
        return { ...baseAgent, allowedTools: merged };
      };

      // Process image files (used by both file input and drag/drop)
      const processImageFiles = (files) => {
        const imageFiles = files.filter(file => file.type.startsWith('image/'));

        imageFiles.forEach(file => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const base64 = e.target.result.split(',')[1]; // Remove data:image/...;base64, prefix
            setSelectedImages(prev => [...prev, {
              name: file.name,
              mimeType: file.type,
              base64: base64,
              preview: e.target.result
            }]);
          };
          reader.readAsDataURL(file);
        });
      };

      // Handle image selection
      const handleImageSelect = (event) => {
        const files = Array.from(event.target.files);
        processImageFiles(files);
        // Reset the input
        event.target.value = '';
      };

      const removeImage = (index) => {
        setSelectedImages(prev => prev.filter((_, i) => i !== index));
      };

      // Drag and drop handlers
      const handleDragEnter = (e) => {
        e.preventDefault();
        e.stopPropagation();
        dragCounter.current++;
        if (e.dataTransfer.items && e.dataTransfer.items.length > 0) {
          const hasImages = Array.from(e.dataTransfer.items).some(item => item.type.startsWith('image/'));
          if (hasImages) {
            setIsDragging(true);
          }
        }
      };

      const handleDragLeave = (e) => {
        e.preventDefault();
        e.stopPropagation();
        dragCounter.current--;
        if (dragCounter.current === 0) {
          setIsDragging(false);
        }
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        e.stopPropagation();
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
        dragCounter.current = 0;

        const files = Array.from(e.dataTransfer.files);
        processImageFiles(files);
      };

      // Add drag and drop listeners to the entire document for the active chat only.
      useEffect(() => {
        if (!isActive) {
          setIsDragging(false);
          dragCounter.current = 0;
          return;
        }

        document.addEventListener('dragenter', handleDragEnter);
        document.addEventListener('dragleave', handleDragLeave);
        document.addEventListener('dragover', handleDragOver);
        document.addEventListener('drop', handleDrop);

        return () => {
          document.removeEventListener('dragenter', handleDragEnter);
          document.removeEventListener('dragleave', handleDragLeave);
          document.removeEventListener('dragover', handleDragOver);
          document.removeEventListener('drop', handleDrop);
        };
      }, [isActive]);

      const sendMessage = () => {
        const text = input.trim();
        if (!text && selectedImages.length === 0) return;

        // If it's a slash command, route it (still sequential)
        if (text.startsWith('/')) {
          if (loadingRef.current) return;
          executeSlashCommand(text);
          return;
        }

        const userMsg = { role: 'user', content: text || 'Please analyze these images' };

        // Add images to message if any are selected
        if (selectedImages.length > 0) {
          userMsg.images = selectedImages.map(img => ({
            base64: img.base64,
            mimeType: img.mimeType
          }));
        }

        setMessages(prev => [...prev, userMsg]);
        setInput('');
        setSelectedImages([]); // Clear selected images after sending
        setLastUserMessage(text);
        if (inputRef.current) inputRef.current.style.height = 'auto';

        // Reset stream state
        streamTextRef.current = '';
        streamThinkingRef.current = '';
        toolUsesRef.current = [];
        setStreamText('');
        setStreamThinking('');
        setToolUses([]);
        setPermDenials(null);
        setPermRequests([]);
        setResolvedPerms({});
        setLoading(true);

        // Build API messages
        const apiMessages = [];
        if (agent.systemPrompt) apiMessages.push({ role: 'system', content: agent.systemPrompt });
        const allMsgs = [...(messages || []), userMsg];
        apiMessages.push(...allMsgs.slice(-20));

        // Generate a unique request ID and start streaming
        const requestId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        activeRequestIdRef.current = requestId;
        // Update last activity time when sending a message
        if (setLastActivityTime) {
          setLastActivityTime(prev => ({ ...prev, [agent.id]: Date.now() }));
        }
        window.agentHub.chatStream(requestId, buildAgentWithSessionTools(agent), apiMessages);
      };

      // Permission approval handlers
      const handleAllowRetry = () => {
        if (!permDenials || !lastUserMessage) return;
        const deniedTools = [...new Set(permDenials.map(d => d.tool))];
        // Add to session-allowed tools (not persisted to agent config)
        setSessionAllowedTools(prev => [...new Set([...prev, ...deniedTools])]);
        setPermDenials(null);
        setPermRequests([]);
        setResolvedPerms({});

        // Reset stream state for retry
        streamTextRef.current = '';
        streamThinkingRef.current = '';
        toolUsesRef.current = [];
        setStreamText('');
        setStreamThinking('');
        setToolUses([]);
        setLoading(true);

        // Re-build messages and retry
        const apiMessages = [];
        if (agent.systemPrompt) apiMessages.push({ role: 'system', content: agent.systemPrompt });
        apiMessages.push(...(messages || []).slice(-20));

        const requestId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        activeRequestIdRef.current = requestId;
        const retryAgent = buildAgentWithSessionTools(agent, [...new Set([...sessionAllowedTools, ...deniedTools])]);
        window.agentHub.chatStream(requestId, retryAgent, apiMessages);
      };

      const handleAlwaysAllow = () => {
        if (!permDenials || !lastUserMessage) return;
        const deniedTools = [...new Set(permDenials.map(d => d.tool))];
        // Persist to agent config permanently
        const existing = (agent.allowedTools || '').split(/[,\s]+/).filter(Boolean);
        const merged = [...new Set([...existing, ...deniedTools])].join(' ');
        onUpdateAgent({ ...agent, allowedTools: merged });
        // Also update session tools and retry
        setSessionAllowedTools(prev => [...new Set([...prev, ...deniedTools])]);
        setPermDenials(null);
        setPermRequests([]);
        setResolvedPerms({});

        streamTextRef.current = '';
        streamThinkingRef.current = '';
        toolUsesRef.current = [];
        setStreamText('');
        setStreamThinking('');
        setToolUses([]);
        setLoading(true);

        const apiMessages = [];
        if (agent.systemPrompt) apiMessages.push({ role: 'system', content: agent.systemPrompt });
        apiMessages.push(...(messages || []).slice(-20));

        const requestId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        activeRequestIdRef.current = requestId;
        const retryAgent = { ...agent, allowedTools: merged };
        window.agentHub.chatStream(requestId, retryAgent, apiMessages);
      };

      const handleDismissDenials = () => {
        setPermDenials(null);
      };

      // Real-time permission approval/denial
      const handleApproveRequest = (request) => {
        const reqId = activeRequestIdRef.current;
        if (!reqId) return;
        window.agentHub.sendPermissionResponse(reqId, request.toolUseId, {
          behavior: 'allow',
          updatedInput: request.input,
        });
        setResolvedPerms(prev => ({ ...prev, [request.toolUseId]: 'approved' }));
      };

      const handleAlwaysAllowRequest = (request) => {
        const reqId = activeRequestIdRef.current;
        if (!reqId) return;
        // Add tool to always-allowed set
        alwaysAllowedToolsRef.current.add(request.tool);
        setAlwaysAllowedTools(prev => new Set([...prev, request.tool]));
        // Approve the current request
        window.agentHub.sendPermissionResponse(reqId, request.toolUseId, {
          behavior: 'allow',
          updatedInput: request.input,
        });
        setResolvedPerms(prev => ({ ...prev, [request.toolUseId]: 'approved' }));
      };

      const handleDenyRequest = (request) => {
        const reqId = activeRequestIdRef.current;
        if (!reqId) return;
        window.agentHub.sendPermissionResponse(reqId, request.toolUseId, {
          behavior: 'deny',
          message: 'User denied this action',
        });
        setResolvedPerms(prev => ({ ...prev, [request.toolUseId]: 'denied' }));
      };

      const onKeyDown = (e) => {
        if (showSlash) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            setSlashIdx(i => Math.min(i + 1, filteredCommands.length - 1));
            return;
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            setSlashIdx(i => Math.max(i - 1, 0));
            return;
          }
          if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) {
            e.preventDefault();
            const selected = filteredCommands[slashIdx];
            if (selected) {
              // If it's just "/" autocomplete the command name, otherwise execute
              if (input === '/' || !input.includes(' ')) {
                setInput(selected.name + ' ');
              } else {
                executeSlashCommand(input);
              }
            }
            return;
          }
          if (e.key === 'Escape') {
            setShowSlash(false);
            return;
          }
        }
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      return (
        <>
          {/* Global drop zone overlay */}
          <div className={`drop-zone ${isDragging ? 'active' : ''}`} style={{ position: 'fixed', inset: 0, zIndex: 9999 }}>
            <div className="drop-zone-message">
              <svg className="drop-zone-icon" viewBox="0 0 24 24" fill="none">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M7 10l5 5 5-5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M12 15V3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <span>Drop images anywhere to upload</span>
            </div>
          </div>
          <div className="chat-header">
            <div className="chat-header-top">
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                <div className={`agent-avatar ${agent.providerClass}`} style={{ width: 34, height: 34, fontSize: 12 }}>
                  {agent.emoji}
                </div>
                <div className="agent-name">{agent.name}</div>
                <div className="agent-provider" style={{ fontSize: 10, display: 'flex', alignItems: 'center', gap: 4, opacity: 0.8 }}>
                  <span className={`status-dot ${status || 'offline'}`} style={{ width: 6, height: 6 }} />
                  {status === 'online' ? 'Connected' : status === 'checking' ? 'Checking...' : 'Disconnected'}
                </div>
                {hasModelPicker && (
                  <div className="model-switcher" ref={modelRef} style={{ marginTop: 2 }}>
                    <button className="model-switcher-btn" onClick={() => setModelOpen(o => !o)}>
                      {currentModelLabel} ▾
                    </button>
                    {modelOpen && (
                      <div className="model-switcher-dropdown">
                        {isCodexAgent && modelLoadState === 'loading' && (
                          <button disabled>Loading models...</button>
                        )}
                        {modelAliases.map(m => (
                          <button
                            key={m.id}
                            className={currentModel === m.id ? 'active' : ''}
                            onClick={() => switchModel(m.id)}
                          >
                            {m.label}
                            {currentModel === m.id && ' \u2713'}
                          </button>
                        ))}
                        {isCodexAgent && modelLoadState !== 'loading' && modelAliases.length === 0 && (
                          <div className="model-switcher-note">
                            {modelLoadError || 'No Codex models found.'}
                          </div>
                        )}
                        {isCodexAgent && modelLoadError && modelAliases.length > 0 && (
                          <div className="model-switcher-note">
                            {modelLoadError}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
                {hasEffortPicker && (
                  <div className="effort-switcher" ref={effortRef} style={{ marginTop: 2 }}>
                    <button className="effort-switcher-btn" onClick={() => setEffortOpen(o => !o)}>
                      Effort: {currentEffortLabel} ▾
                    </button>
                    {effortOpen && (
                      <div className="effort-switcher-dropdown">
                        {effortLevels.map(e => (
                          <button
                            key={e.id}
                            className={currentEffort === e.id ? 'active' : ''}
                            onClick={() => switchEffort(e.id)}
                          >
                            {e.label}
                            {currentEffort === e.id && ' \u2713'}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
              <div className="chat-header-actions">
                <button
                  className={`btn-thinking-toggle ${showThinking ? 'active' : ''}`}
                  onClick={() => setShowThinking(t => !t)}
                  title={showThinking ? 'Hide thinking' : 'Show thinking'}
                >
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1.5a4.5 4.5 0 0 0-3.2 7.6c.5.5.7 1.1.7 1.9v.5h5v-.5c0-.8.3-1.4.7-1.9A4.5 4.5 0 0 0 8 1.5zM6 13h4v.5a2 2 0 0 1-4 0V13z" fill="currentColor"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div className="chat-messages" ref={chatAreaRef} style={{ position: 'relative' }}>
            {messages.length === 0 && !loading && (
              <div className="chat-empty">
                <div className="chat-empty-icon">
                  <div className={`agent-avatar ${agent.providerClass}`} style={{ width: 36, height: 36, fontSize: 12 }}>
                    {agent.emoji}
                  </div>
                </div>
                <div className="chat-empty-title">Start a conversation with {agent.name}</div>
                <div className="chat-empty-hint">
                  Press <span className="chat-empty-kbd">/</span> to see available commands
                </div>
              </div>
            )}
            {messages.filter(msg => !msg.content?.includes('is typing...')).map((msg, i) => (
              <div key={i} className={`msg ${msg.role}`}>
                {showThinking && msg.thinking && (
                  <ThinkingBlock thinking={msg.thinking} />
                )}
                <MessageContent content={msg.content} />
                {msg.images && msg.images.length > 0 && (
                  <div className="msg-images">
                    {msg.images.map((img, idx) => (
                      <img
                        key={idx}
                        src={`data:${img.mimeType};base64,${img.base64}`}
                        alt=""
                        className="msg-image"
                      />
                    ))}
                  </div>
                )}
                {msg.role === 'error' && (msg.content.includes('not authenticated') || msg.content.includes('OAuth') || msg.content.includes('auth') || msg.content.includes('setup')) && (
                  <AuthLoginButton agent={agent} onSuccess={() => {
                    setMessages(prev => [...prev, { role: 'assistant', content: 'Authenticated! You can now send messages.' }]);
                  }} />
                )}
              </div>
            ))}
            {loading && (streamText || streamThinking || toolUses.length > 0 || permRequests.length > 0) && (
              <div className="msg assistant">
                {showThinking && streamThinking && (
                  <ThinkingBlock thinking={streamThinking} />
                )}
                {toolUses.length > 0 && (
                  <div style={{ marginBottom: streamText ? 6 : 0 }}>
                    {toolUses.map((tu, i) => {
                      const isDenied = permDenials?.some(d => d.toolUseId === tu.id);
                      return <ToolUseIndicator key={tu.id || i} tool={tu.tool} input={tu.input} denied={isDenied} />;
                    })}
                  </div>
                )}
                {permRequests.length > 0 && (
                  <div style={{ marginBottom: streamText ? 6 : 0 }}>
                    {permRequests.map((pr) => (
                      <ToolApprovalRequest
                        key={pr.toolUseId}
                        request={pr}
                        onApprove={handleApproveRequest}
                        onAlwaysAllow={handleAlwaysAllowRequest}
                        onDeny={handleDenyRequest}
                        resolved={resolvedPerms[pr.toolUseId] || null}
                      />
                    ))}
                  </div>
                )}
                {streamText}
                <span className="streaming-indicator">
                  <span /><span /><span />
                </span>
              </div>
            )}
            {loading && !streamText && !streamThinking && toolUses.length === 0 && permRequests.length === 0 && (
              <div className="typing-indicator">
                <span /><span /><span />
              </div>
            )}
            {permDenials && permDenials.length > 0 && !loading && (
              <PermissionBanner
                denials={permDenials}
                onAllowRetry={handleAllowRetry}
                onAlwaysAllow={handleAlwaysAllow}
                onDismiss={handleDismissDenials}
              />
            )}
            {completionStatus && typeof completionStatus === 'number' && completionStatus > 0 && !loading && messages.length > 0 && (
              <div style={{ alignSelf: messages[messages.length - 1].role === 'user' ? 'flex-end' : 'flex-start', fontSize: 11, color: 'var(--text-2)', margin: '-4px 16px 8px 16px' }}>
                Delivered
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          <div className="chat-input-bar">
            {showSlash && (
              <div className="slash-palette">
                {filteredCommands.map((cmd, i) => (
                  <div
                    key={cmd.name}
                    className={`slash-palette-item ${i === slashIdx ? 'selected' : ''}`}
                    onClick={() => { setInput(cmd.name + ' '); inputRef.current?.focus(); }}
                    onDoubleClick={() => executeSlashCommand(cmd.name)}
                  >
                    <span className="slash-palette-item-name">{cmd.name}</span>
                    <span className="slash-palette-item-desc">{cmd.desc}</span>
                  </div>
                ))}
              </div>
            )}
            {selectedImages.length > 0 && (
              <div className="selected-images">
                {selectedImages.map((img, idx) => (
                  <div key={idx} className="image-preview">
                    <img src={img.preview} alt={img.name} />
                    <button className="remove-image" onClick={() => removeImage(idx)}>×</button>
                  </div>
                ))}
              </div>
            )}
            <div className="chat-input-wrap">
              <textarea
                ref={inputRef}
                className="chat-input"
                rows={1}
                placeholder={`Message ${agent.name}... (type / for commands)`}
                value={input}
                onChange={e => {
                  setInput(e.target.value);
                  const el = e.target;
                  el.style.height = 'auto';
                  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
                }}
                onKeyDown={onKeyDown}
              />
              <label className="btn-attach">
                <input
                  type="file"
                  accept="image/*"
                  multiple
                  style={{ display: 'none' }}
                  onChange={handleImageSelect}
                />
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M8 2v12M2 8h12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                </svg>
              </label>
              <button className="btn-send" onClick={sendMessage} disabled={!input.trim() && selectedImages.length === 0}>
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3l5 5h-3.5v5h-3V8H3l5-5z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
        </>
      );
    }

    // ── Terminal View ──
    function TerminalView({ agent, isActive, status, messages, setMessages, onLoadingChange, setLastActivityTime }) {
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [streamOutput, setStreamOutput] = useState('');
      const [cwd, setCwd] = useState('~');
      const [initialized, setInitialized] = useState(false);
      const [history, setHistory] = useState([]);
      const [historyIdx, setHistoryIdx] = useState(-1);
      const [completions, setCompletions] = useState([]);
      const [completionIdx, setCompletionIdx] = useState(0);
      const [showCompletions, setShowCompletions] = useState(false);
      const bottomRef = useRef(null);
      const inputRef = useRef(null);
      const chatAreaRef = useRef(null);
      const streamOutputRef = useRef('');
      const activeRequestIdRef = useRef(null);
      const loadingRef = useRef(false);
      const rafRef = useRef(null);
      const tabCountRef = useRef(0);
      const lastTabPartialRef = useRef('');

      // Initialize terminal session
      useEffect(() => {
        window.agentHub.terminalInit(agent).then(res => {
          if (res.cwd) setCwd(res.cwd);
          setInitialized(true);
        });
      }, [agent.id]);

      // Scroll to bottom - instant for snappy feel
      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'auto' });
      }, [messages, streamOutput]);

      // Focus input
      useEffect(() => {
        if (isActive) inputRef.current?.focus();
      }, [agent.id, isActive]);

      // Set up terminal listeners
      useEffect(() => {
        let cancelled = false;

        const offOutput = window.agentHub.onTerminalOutput((id, text) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          streamOutputRef.current += text;
          // Throttle React updates to animation frames for smooth high-throughput output
          if (!rafRef.current) {
            rafRef.current = requestAnimationFrame(() => {
              rafRef.current = null;
              if (!cancelled) setStreamOutput(streamOutputRef.current);
            });
          }
        });

        const offDone = window.agentHub.onTerminalDone((id, meta) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          // Cancel any pending rAF
          if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

          let finalOutput = streamOutputRef.current;
          // Strip CWD marker and everything after it
          const markerIdx = finalOutput.indexOf('___AGHUB_CWD___');
          if (markerIdx !== -1) {
            finalOutput = finalOutput.substring(0, markerIdx);
          }
          finalOutput = finalOutput.replace(/\n+$/, '');

          if (meta.cwd) setCwd(meta.cwd);

          if (finalOutput) {
            setMessages(prev => [...prev, {
              role: 'assistant',
              content: finalOutput,
              exitCode: meta.exitCode,
            }]);
          } else if (meta.exitCode && meta.exitCode !== 0) {
            setMessages(prev => [...prev, {
              role: 'error',
              content: `Exited with code ${meta.exitCode}`,
            }]);
          }

          streamOutputRef.current = '';
          setStreamOutput('');
          setLoading(false);
          loadingRef.current = false;
          onLoadingChange?.(false);
          activeRequestIdRef.current = null;
        });

        const offError = window.agentHub.onTerminalError((id, err) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }
          setMessages(prev => [...prev, { role: 'error', content: err }]);
          streamOutputRef.current = '';
          setStreamOutput('');
          setLoading(false);
          loadingRef.current = false;
          onLoadingChange?.(false);
          activeRequestIdRef.current = null;
        });

        return () => {
          cancelled = true;
          if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }
          offOutput();
          offDone();
          offError();
        };
      }, [agent.id]);

      const handleSend = () => {
        const text = input.trim();
        if (!text) return;

        // If a command is already running, forward input as stdin
        if (loadingRef.current) {
          window.agentHub.terminalStdin(agent.id, text + '\n');
          // Show what was sent as a dimmer stdin message
          setMessages(prev => [...prev, { role: 'stdin', content: text }]);
          setInput('');
          if (inputRef.current) inputRef.current.style.height = 'auto';
          return;
        }

        // Handle clear locally
        if (text === 'clear') {
          setMessages([]);
          setInput('');
          return;
        }

        setMessages(prev => [...prev, { role: 'user', content: text }]);
        setHistory(prev => [text, ...prev.filter(h => h !== text)].slice(0, 100));
        setHistoryIdx(-1);
        setInput('');
        if (inputRef.current) inputRef.current.style.height = 'auto';

        streamOutputRef.current = '';
        setStreamOutput('');
        setLoading(true);
        loadingRef.current = true;
        onLoadingChange?.(true);

        const requestId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        activeRequestIdRef.current = requestId;

        if (setLastActivityTime) {
          setLastActivityTime(prev => ({ ...prev, [agent.id]: Date.now() }));
        }

        window.agentHub.terminalExec(requestId, agent, text);
      };

      const handleKill = () => {
        window.agentHub.terminalKill(agent.id);
      };

      const applyCompletion = (completion) => {
        const parts = input.split(/\s+/);
        const partial = parts[parts.length - 1] || '';
        // Replace the last partial word with the completion
        const prefix = input.substring(0, input.length - partial.length);
        const needsSpace = !completion.endsWith('/');
        setInput(prefix + completion + (needsSpace ? ' ' : ''));
        setShowCompletions(false);
        setCompletions([]);
        tabCountRef.current = 0;
        lastTabPartialRef.current = '';
        inputRef.current?.focus();
      };

      const onKeyDown = (e) => {
        // Reset tab count on any non-tab key
        if (e.key !== 'Tab') {
          tabCountRef.current = 0;
          lastTabPartialRef.current = '';
        }

        // Escape closes completion palette
        if (e.key === 'Escape' && showCompletions) {
          e.preventDefault();
          setShowCompletions(false);
          setCompletions([]);
          return;
        }

        // When completion palette is open, arrow keys navigate it
        if (showCompletions && completions.length > 0) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            setCompletionIdx(prev => (prev + 1) % completions.length);
            return;
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            setCompletionIdx(prev => (prev - 1 + completions.length) % completions.length);
            return;
          }
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            applyCompletion(completions[completionIdx]);
            return;
          }
        }

        // Tab completion
        if (e.key === 'Tab' && !loadingRef.current) {
          e.preventDefault();
          const text = input;
          if (!text) return;

          tabCountRef.current++;

          // If palette is already showing, cycle through completions
          if (showCompletions && completions.length > 0) {
            setCompletionIdx(prev => e.shiftKey
              ? (prev - 1 + completions.length) % completions.length
              : (prev + 1) % completions.length
            );
            return;
          }

          window.agentHub.terminalComplete(agent, text).then(res => {
            if (!res.completions || res.completions.length === 0) return;

            if (res.completions.length === 1) {
              // Single match: apply immediately
              applyCompletion(res.completions[0]);
            } else {
              // Multiple matches: find common prefix first
              const common = res.completions.reduce((a, b) => {
                let i = 0;
                while (i < a.length && i < b.length && a[i] === b[i]) i++;
                return a.substring(0, i);
              });

              if (common.length > res.partial.length) {
                // Fill common prefix
                const parts = input.split(/\s+/);
                const partial = parts[parts.length - 1] || '';
                const prefix = input.substring(0, input.length - partial.length);
                setInput(prefix + common);
                lastTabPartialRef.current = common;
              }

              // Show palette (first tab fills prefix, always show palette for multiple)
              setCompletions(res.completions);
              setCompletionIdx(0);
              setShowCompletions(true);
            }
          });
          return;
        }

        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          setShowCompletions(false);
          setCompletions([]);
          handleSend();
          return;
        }
        // Ctrl+C to kill running process
        if (e.key === 'c' && e.ctrlKey && loadingRef.current) {
          e.preventDefault();
          handleKill();
          return;
        }
        // Command history with up/down arrows (only when not running and palette not open)
        if (!loadingRef.current && !showCompletions && e.key === 'ArrowUp' && history.length > 0) {
          e.preventDefault();
          const newIdx = Math.min(historyIdx + 1, history.length - 1);
          setHistoryIdx(newIdx);
          setInput(history[newIdx]);
          return;
        }
        if (!loadingRef.current && !showCompletions && e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIdx <= 0) {
            setHistoryIdx(-1);
            setInput('');
          } else {
            const newIdx = historyIdx - 1;
            setHistoryIdx(newIdx);
            setInput(history[newIdx]);
          }
          return;
        }
      };

      // Strip marker from streaming display
      const displayOutput = (() => {
        const idx = streamOutput.indexOf('___AGHUB_CWD___');
        if (idx !== -1) return streamOutput.substring(0, idx).replace(/\n+$/, '');
        return streamOutput;
      })();

      return (
        <>
          <div className="chat-header">
            <div className="chat-header-top">
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                <div className={`agent-avatar ${agent.providerClass}`} style={{ width: 34, height: 34, fontSize: 12 }}>
                  {agent.emoji}
                </div>
                <div className="agent-name">{agent.name}</div>
                <div className="terminal-cwd" title={cwd}>
                  <svg width="10" height="10" viewBox="0 0 16 16" fill="none" style={{ opacity: 0.6, flexShrink: 0 }}>
                    <path d="M2 4h5l2 2h5v7H2V4z" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinejoin="round"/>
                  </svg>
                  {cwd}
                </div>
                <div className="agent-provider" style={{ fontSize: 10, display: 'flex', alignItems: 'center', gap: 4, opacity: 0.8 }}>
                  <span className={`status-dot ${status || 'offline'}`} style={{ width: 6, height: 6 }} />
                  {status === 'online' ? 'Connected' : status === 'checking' ? 'Checking...' : 'Disconnected'}
                </div>
              </div>
            </div>
          </div>

          <div className="chat-messages terminal-messages" ref={chatAreaRef}>
            {messages.length === 0 && !loading && (
              <div className="chat-empty">
                <div className="chat-empty-icon">
                  <div className={`agent-avatar ${agent.providerClass}`} style={{ width: 36, height: 36, fontSize: 12 }}>
                    {agent.emoji}
                  </div>
                </div>
                <div className="chat-empty-title">
                  {agent.provider === 'terminal-ssh'
                    ? `SSH Terminal \u2014 ${agent.sshUser || 'root'}@${agent.sshHost || '...'}`
                    : 'Local Terminal'}
                </div>
                <div className="chat-empty-hint">
                  Type a command and press <span className="chat-empty-kbd">Enter</span> to run it
                </div>
                <div className="chat-empty-hint" style={{ marginTop: 4, fontSize: 11 }}>
                  <span className="chat-empty-kbd">{'\u2191'}</span> / <span className="chat-empty-kbd">{'\u2193'}</span> history &nbsp; <span className="chat-empty-kbd">Tab</span> complete &nbsp; <span className="chat-empty-kbd">Ctrl+C</span> kill &nbsp; <code>clear</code> reset
                </div>
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`msg ${msg.role === 'stdin' ? 'stdin-msg' : msg.role} ${msg.role === 'assistant' ? 'terminal-output' : ''}`}>
                {msg.role === 'user' && <span className="terminal-prompt">$</span>}
                {msg.role === 'stdin' && <span className="terminal-prompt" style={{ opacity: 0.4 }}>{'>'}</span>}
                {msg.role === 'assistant' ? (
                  <>
                    <pre className="terminal-pre">{msg.content}</pre>
                    {typeof msg.exitCode === 'number' && msg.exitCode !== 0 && (
                      <div className="terminal-exit-code error">exit {msg.exitCode}</div>
                    )}
                  </>
                ) : (
                  <span className={msg.role === 'user' ? 'terminal-cmd' : ''}>{msg.content}</span>
                )}
              </div>
            ))}
            {loading && displayOutput && (
              <div className="msg assistant terminal-output">
                <pre className="terminal-pre">{displayOutput}</pre>
                <span className="streaming-indicator"><span /><span /><span /></span>
              </div>
            )}
            {loading && !displayOutput && (
              <div className="typing-indicator">
                <span /><span /><span />
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          <div className="chat-input-bar">
            <div className="chat-input-wrap terminal-input-wrap" style={{ position: 'relative' }}>
              {showCompletions && completions.length > 0 && (
                <div className="slash-palette" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                  {completions.map((c, i) => (
                    <div
                      key={c}
                      className={`slash-palette-item ${i === completionIdx ? 'selected' : ''}`}
                      onClick={() => applyCompletion(c)}
                      onMouseEnter={() => setCompletionIdx(i)}
                    >
                      <span className="slash-palette-item-name">{c}</span>
                    </div>
                  ))}
                </div>
              )}
              <span className={`terminal-input-prompt ${loading ? 'stdin-mode' : ''}`}>
                {loading ? '>' : '$'}
              </span>
              <textarea
                ref={inputRef}
                className="chat-input terminal-input"
                rows={1}
                placeholder={loading ? 'Type input for running process...' : 'Enter command...'}
                value={input}
                onChange={e => {
                  setInput(e.target.value);
                  if (!loadingRef.current) setHistoryIdx(-1);

                  if (showCompletions) { setShowCompletions(false); setCompletions([]); }

                  <>
                    <div className="form-row">
                      <label>Starting Directory</label>
                      <input value={form.workDir || ''} onChange={e => setForm(f => ({ ...f, workDir: e.target.value }))} placeholder="e.g. ~/projects (blank = home dir)" />
                      <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 4 }}>
                        The terminal will start in this directory
                      </div>
                    </div>
                  </>
                )}

                {form.provider === 'terminal-ssh' && (
                  <>
                    <div className="form-row">
                      <label>SSH Host</label>
                      <input value={form.sshHost || ''} onChange={e => setForm(f => ({ ...f, sshHost: e.target.value }))} placeholder="your-server.com or IP address" />
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <div className="form-row" style={{ flex: 1 }}>
                        <label>SSH User</label>
                        <input value={form.sshUser || ''} onChange={e => setForm(f => ({ ...f, sshUser: e.target.value }))} placeholder="root" />
                      </div>
                      <div className="form-row" style={{ flex: 1 }}>
                        <label>SSH Port</label>
                        <input type="number" value={form.sshPort || 22} onChange={e => setForm(f => ({ ...f, sshPort: parseInt(e.target.value) || 22 }))} />
                      </div>
                    </div>
                    <div className="form-row">
                      <label>SSH Key Path (optional)</label>
                      <input value={form.sshKey || ''} onChange={e => setForm(f => ({ ...f, sshKey: e.target.value }))} placeholder="~/.ssh/id_rsa (blank = default key)" />
                    </div>
                    <div className="form-row">
                      <label>Starting Directory on Remote</label>
                      <input value={form.workDir || ''} onChange={e => setForm(f => ({ ...f, workDir: e.target.value }))} placeholder="e.g. /root/projects (blank = home dir)" />
                    </div>
                  </>
                )}

                <h3>Test Connection</h3>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <button className="btn btn-test" onClick={handleTest} disabled={testStatus === 'testing'}>
                    {testStatus === 'testing' ? 'Testing...' : 'Test Connection'}
                  </button>
                </div>
                {testStatus && testStatus !== 'testing' && (
                  <div className={`test-result ${testStatus.ok ? 'success' : 'failure'}`}>
                    {testStatus.ok ? '✓ ' : '✗ '}{testStatus.msg}
                  </div>
                )}
                {testStatus === 'testing' && (
                  <div className="test-result testing">Connecting...</div>
                )}

                {!isTerminalProvider(form.provider) && <h3>Behavior</h3>}
                {form.provider === 'openai-compat' && (
                  <div className="form-row">
                    <label style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <input type="checkbox" checked={form.showThinking || false} onChange={e => setForm(f => ({ ...f, showThinking: e.target.checked }))} style={{ width: 'auto' }} />
                      Show Thinking
                    </label>
                    <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 4 }}>
                      Show reasoning content if the model supports it
                    </div>
                  </div>
                )}

                <div className="form-actions" style={{ justifyContent: 'space-between' }}>
                  {agents.find(a => a.id === form.id) ? (
                    <button className="btn btn-danger" onClick={() => { if (confirm('Remove this agent?')) onRemove(form.id); }}>Remove</button>
                  ) : <div />}
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button className="btn btn-ghost" onClick={() => { setEditAgent(null); setShowPresets(false); }}>Back</button>
                    <button className="btn btn-primary" onClick={handleSave}>Save</button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
