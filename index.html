<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/marked@14/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #1e1e1e;
      --bg-1: #282828;
      --bg-2: #323232;
      --bg-3: #3e3e3e;
      --bg-4: #4a4a4a;
      --border: #424242;
      --border-light: #525252;
      --text-0: #ececec;
      --text-1: #c0c0c0;
      --text-2: #8a8a8a;
      --accent: #0A84FF;
      --accent-dim: #006ce6;
      --accent-glow: rgba(10,132,255,0.15);
      --accent-subtle: rgba(10,132,255,0.08);
      --msg-agent-bg: #262628;
      --green: #34c759;
      --green-dim: rgba(52,199,89,0.12);
      --red: #ff3b30;
      --red-dim: rgba(255,59,48,0.1);
      --orange: #ff9f0a;
      --orange-dim: rgba(255,159,10,0.1);
      --blue: #0a84ff;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.1);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.2);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html[data-theme="light"],
    html[data-theme="light"] *,
    html.light-theme {
      --bg-0: #ffffff;
      --bg-1: #f5f5f7;
      --bg-2: #ebebeb;
      --bg-3: #e0e0e0;
      --bg-4: #d6d6d6;
      --border: #e5e5ea;
      --border-light: #d1d1d6;
      --text-0: #000000;
      --text-1: #3a3a3c;
      --text-2: #8e8e93;
      --accent: #007aff;
      --accent-dim: #006ce6;
      --accent-glow: rgba(0,122,255,0.12);
      --accent-subtle: rgba(0,122,255,0.06);
      --msg-agent-bg: #e9e9eb;
      --green: #34C759;
      --green-dim: rgba(52,199,89,0.08);
      --red: #FF3B30;
      --red-dim: rgba(255,59,48,0.06);
      --orange: #FF9F0A;
      --orange-dim: rgba(255,159,10,0.08);
      --blue: #007AFF;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-0);
      color: var(--text-0);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, input, textarea, select {
      -webkit-app-region: no-drag;
      font-family: inherit;
    }

    /* ── Layout ── */
    #root { height: 100vh; display: flex; flex-direction: column; }

    .titlebar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 80px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
      -webkit-app-region: drag;
    }

    .titlebar-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .titlebar-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 272px;
      background: var(--bg-1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sidebar-header h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-2);
      font-weight: 700;
    }

    .btn-icon {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all var(--transition);
    }
    .btn-icon:hover { background: var(--bg-3); color: var(--text-0); border-color: var(--border-light); }

    .agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .agent-card {
      padding: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
      position: relative;
    }
    .agent-card:hover { background: var(--bg-2); }
    .agent-card.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .agent-card.active .agent-provider,
    .agent-card.active .agent-name {
      color: white;
    }
    .agent-card.active .agent-avatar {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset;
    }

    .agent-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .agent-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
      letter-spacing: 0.5px;
      box-shadow: none;
    }

    .agent-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .agent-name {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: -0.1px;
      line-height: 1.3;
      min-width: 0;
    }
    .agent-name-text {
      white-space: nowrap;
      overflow: hidden;
      flex-shrink: 1;
      min-width: 0;
    }
    .agent-provider {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.3;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .status-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
    .status-dot.offline { background: var(--text-2); opacity: 0.5; }
    .status-dot.checking { background: var(--orange); animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-settings {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition);
    }
    .btn-settings:hover { background: var(--bg-2); color: var(--text-1); border-color: var(--border-light); }

    /* ── Main content ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-0);
      min-width: 0;
    }

    /* ── Dashboard (no agent selected) ── */
    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      gap: 20px;
    }

    .dash-logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #a78bfa, #c4b5fd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: white;
      box-shadow: 0 8px 32px rgba(124,106,255,0.3);
      letter-spacing: -1px;
    }

    .dash-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-0), var(--text-1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-sub { color: var(--text-2); font-size: 14px; text-align: center; max-width: 420px; line-height: 1.7; }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 480px;
      width: 100%;
      margin-top: 24px;
    }

    .dash-stat {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 100px;
      transition: all var(--transition);
    }
    .dash-stat:hover { border-color: var(--border-light); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .dash-stat-num { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
    .dash-stat-label { font-size: 10px; color: var(--text-2); margin-top: 6px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }

    /* ── Chat ── */
    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: rgba(var(--bg-1), 0.85); /* fallback */
      background: color-mix(in srgb, var(--bg-1) 85%, transparent);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      min-height: 60px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .chat-header .agent-name { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
    .chat-header .agent-avatar { width: 34px !important; height: 34px !important; }
    .chat-header-top { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
    .chat-header-actions { position: absolute; right: 0; top: 0; display: flex; gap: 8px; }

    /* ── Model Switcher ── */
    .model-switcher { position: relative; display: inline-flex; }
    .model-switcher-btn {
      background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-1); font-size: 10px; padding: 2px 8px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: var(--transition);
    }
    .model-switcher-btn:hover { background: var(--bg-3); color: var(--text-0); }
    .model-switcher-dropdown {
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      margin-top: 4px; background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      min-width: 200px; z-index: 100; overflow: hidden;
    }
    .model-switcher-dropdown button {
      width: 100%; text-align: left; padding: 8px 12px; background: none;
      border: none; color: var(--text-1); font-size: 12px; cursor: pointer;
    }
    .model-switcher-dropdown button:hover { background: var(--accent-subtle); color: var(--text-0); }
    .model-switcher-dropdown button.active { color: var(--accent); font-weight: 600; }
    .model-switcher-dropdown button:disabled { cursor: default; opacity: 0.65; }
    .model-switcher-dropdown button:disabled:hover { background: none; color: var(--text-1); }

    /* ── Effort Switcher ── */
    .effort-switcher { position: relative; display: inline-flex; }
    .effort-switcher-btn {
      background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-1); font-size: 10px; padding: 2px 8px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: var(--transition);
    }
    .effort-switcher-btn:hover { background: var(--bg-3); color: var(--text-0); }
    .effort-switcher-dropdown {
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      margin-top: 4px; background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      min-width: 160px; z-index: 100; overflow: hidden;
    }
    .effort-switcher-dropdown button {
      width: 100%; text-align: left; padding: 8px 12px; background: none;
      border: none; color: var(--text-1); font-size: 12px; cursor: pointer;
    }
    .effort-switcher-dropdown button:hover { background: var(--accent-subtle); color: var(--text-0); }
    .effort-switcher-dropdown button.active { color: var(--accent); font-weight: 600; }
    .model-switcher-note {
      padding: 8px 12px;
      color: var(--text-2);
      font-size: 11px;
      line-height: 1.35;
      border-top: 1px solid var(--border);
    }

    .completion-indicator {
      display: flex;
      align-items: center;
      animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      50% {
        transform: scale(1.1);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .btn-thinking-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .btn-thinking-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .btn-thinking-toggle.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    /* Message content styles for markdown */
    .message-content {
      white-space: normal;
    }
    .message-content > *:first-child {
      margin-top: 0;
    }
    .message-content > *:last-child {
      margin-bottom: 0;
    }
    .message-content p {
      margin: 0.5em 0;
    }
    .message-content pre {
      background: rgba(0, 0, 0, 0.05);
      padding: 8px 12px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .dark .message-content pre {
      background: rgba(255, 255, 255, 0.05);
    }
    .message-content code {
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 4px;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
    }
    .dark .message-content code {
      background: rgba(255, 255, 255, 0.1);
    }
    .message-content pre code {
      background: none;
      padding: 0;
    }
    .message-content ul, .message-content ol {
      margin: 0.5em 0;
      padding-left: 1.5em;
    }
    .message-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 0.5em 0;
      padding-left: 1em;
      opacity: 0.8;
    }
    .message-content h1, .message-content h2, .message-content h3,
    .message-content h4, .message-content h5, .message-content h6 {
      margin: 0.75em 0 0.5em;
      font-weight: 600;
    }
    .message-content table {
      border-collapse: collapse;
      margin: 0.5em 0;
    }
    .message-content th, .message-content td {
      border: 1px solid rgba(0, 0, 0, 0.1);
      padding: 4px 8px;
    }
    .dark .message-content th, .dark .message-content td {
      border-color: rgba(255, 255, 255, 0.1);
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-radius: 18px 18px 4px 18px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--msg-agent-bg);
      color: var(--text-0);
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(0,0,0,0.05); /* very subtle border to help separation */
    }
    .msg.assistant code {
      font-family: "SF Mono", Menlo, Consolas, Monaco, monospace;
      font-size: 13px;
      background: var(--bg-2);
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid var(--border);
    }
    .thinking-block {
      margin-bottom: 8px;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .thinking-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      padding: 4px 0;
      transition: color var(--transition);
    }
    .thinking-toggle:hover { color: var(--accent); }
    .thinking-icon { font-size: 10px; }
    .thinking-content {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-2);
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.5;
    }
    .msg.error {
      align-self: center;
      background: var(--red-dim);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--red);
      font-size: 13px;
      border-radius: 10px;
    }
    .msg.system {
      align-self: center;
      background: var(--accent-subtle);
      border: 1px solid rgba(124,106,255,0.15);
      color: var(--accent);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      white-space: pre-wrap;
      border-radius: 10px;
    }

    .msg-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .msg-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .msg-image:hover {
      transform: scale(1.05);
    }

    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 16px 18px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 6px;
      animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-2);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.16s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* Agent thinking indicator in sidebar */
    .agent-thinking-indicator {
      display: inline-flex;
      gap: 2px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .agent-thinking-indicator span {
      width: 4px; height: 4px;
      background: var(--accent, #7c6aff);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .agent-thinking-indicator span:nth-child(2) { animation-delay: 0.16s; }
    .agent-thinking-indicator span:nth-child(3) { animation-delay: 0.32s; }

    /* Agent completion badge in sidebar */
    .agent-completion-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background-color: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
      animation: fadeInScale 0.3s ease-out;
      box-shadow: var(--shadow-sm);
    }
    .agent-card.active .agent-completion-badge {
      background-color: white;
      color: var(--accent);
    }

    .streaming-indicator {
      display: inline-flex;
      gap: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .streaming-indicator span {
      width: 5px; height: 5px;
      background: var(--accent, #7c6aff);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
      opacity: 0.6;
    }
    .streaming-indicator span:nth-child(2) { animation-delay: 0.16s; }
    .streaming-indicator span:nth-child(3) { animation-delay: 0.32s; }

    /* Tool use indicators (inline during streaming) */
    .tool-use-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      margin: 3px 0;
      background: color-mix(in srgb, var(--accent, #7c6aff) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent, #7c6aff) 18%, transparent);
      border-radius: 6px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 11.5px;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tool-use-indicator .tool-icon {
      color: var(--accent, #7c6aff);
      font-size: 12px;
      flex-shrink: 0;
    }
    .tool-use-indicator.denied {
      background: color-mix(in srgb, #ef4444 10%, transparent);
      border-color: color-mix(in srgb, #ef4444 25%, transparent);
    }
    .tool-use-indicator.denied .tool-icon {
      color: #ef4444;
    }

    /* Permission denial banner */
    /* Real-time tool approval request (shown during streaming) */
    .tool-approval-request {
      align-self: stretch;
      background: color-mix(in srgb, var(--accent, #7c6aff) 6%, var(--bg-1));
      border: 1px solid color-mix(in srgb, var(--accent, #7c6aff) 30%, transparent);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 6px 0;
      animation: msgIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tool-approval-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tool-approval-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: color-mix(in srgb, var(--accent, #7c6aff) 15%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .tool-approval-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent, #7c6aff);
    }
    .tool-approval-waiting {
      font-size: 11px;
      color: var(--text-2);
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tool-approval-waiting .pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent, #7c6aff);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .tool-approval-detail {
      font-size: 12px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      color: var(--text-1);
      padding: 8px 10px;
      background: color-mix(in srgb, var(--accent, #7c6aff) 4%, var(--bg-0));
      border-radius: 6px;
      margin-bottom: 10px;
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 120px;
      overflow-y: auto;
    }
    .tool-approval-actions {
      display: flex;
      gap: 8px;
    }
    .tool-approval-actions button {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .tool-approval-actions .btn-approve {
      background: #22c55e;
      color: #fff;
      border-color: #22c55e;
    }
    .tool-approval-actions .btn-approve:hover {
      filter: brightness(1.1);
    }
    .tool-approval-actions .btn-always-allow {
      background: color-mix(in srgb, #22c55e 15%, transparent);
      color: #22c55e;
      border-color: color-mix(in srgb, #22c55e 40%, transparent);
    }
    .tool-approval-actions .btn-always-allow:hover {
      background: color-mix(in srgb, #22c55e 25%, transparent);
    }
    .tool-approval-actions .btn-deny {
      background: color-mix(in srgb, #ef4444 12%, transparent);
      color: #ef4444;
      border-color: color-mix(in srgb, #ef4444 30%, transparent);
    }
    .tool-approval-actions .btn-deny:hover {
      background: color-mix(in srgb, #ef4444 20%, transparent);
    }
    .tool-approval-resolved {
      opacity: 0.5;
      pointer-events: none;
    }
    .tool-approval-resolved .tool-approval-actions {
      display: none;
    }
    .tool-approval-status {
      font-size: 11px;
      font-weight: 500;
      margin-top: 4px;
    }
    .tool-approval-status.approved { color: #22c55e; }
    .tool-approval-status.denied { color: #ef4444; }

    .permission-banner {
      align-self: center;
      max-width: 85%;
      background: color-mix(in srgb, #f59e0b 8%, var(--bg-1));
      border: 1px solid color-mix(in srgb, #f59e0b 25%, transparent);
      border-radius: 12px;
      padding: 16px;
      margin: 8px 0;
      animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .permission-banner-title {
      font-size: 13px;
      font-weight: 600;
      color: #f59e0b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .permission-banner-list {
      list-style: none;
      margin: 8px 0;
      padding: 0;
    }
    .permission-banner-list li {
      font-size: 12px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      color: var(--text-1);
      padding: 6px 8px;
      margin: 2px 0;
      background: color-mix(in srgb, #f59e0b 5%, transparent);
      border-radius: 4px;
    }
    .permission-banner-list li strong {
      color: #f59e0b;
    }
    .permission-banner-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .permission-banner-actions button {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .permission-banner-actions .btn-allow {
      background: var(--accent, #7c6aff);
      color: #fff;
      border-color: var(--accent, #7c6aff);
    }
    .permission-banner-actions .btn-allow:hover {
      filter: brightness(1.1);
    }
    .permission-banner-actions .btn-always {
      background: color-mix(in srgb, var(--accent, #7c6aff) 12%, transparent);
      color: var(--accent, #7c6aff);
      border-color: color-mix(in srgb, var(--accent, #7c6aff) 25%, transparent);
    }
    .permission-banner-actions .btn-always:hover {
      background: color-mix(in srgb, var(--accent, #7c6aff) 20%, transparent);
    }
    .permission-banner-actions .btn-dismiss {
      background: transparent;
      color: var(--text-2);
      border-color: var(--border);
      margin-left: auto;
    }
    .permission-banner-actions .btn-dismiss:hover {
      color: var(--text-1);
    }

    .chat-input-bar {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-1);
      position: relative;
    }
    .chat-input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-1);
      padding: 6px 6px 6px 14px;
      transition: all var(--transition);
      position: relative;
    }
    .chat-input-wrap:focus-within {
      border-color: var(--accent);
    }

    .chat-input {
      flex: 1;
      padding: 6px 0;
      border: none;
      background: transparent;
      color: var(--text-0);
      font-size: 15px;
      line-height: 1.5;
      outline: none;
      resize: none;
      min-height: 22px;
      max-height: 200px;
      overflow-y: auto;
    }
    .chat-input::placeholder { color: var(--text-2); }

    .btn-send {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2px;
    }
    .btn-send:hover { background: var(--accent-dim); }
    .btn-send:active { opacity: 0.8; }
    .btn-send:disabled { opacity: 0.25; cursor: not-allowed; }

    .btn-attach {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: 50%;
      border: none;
      background: var(--bg-3);
      color: var(--text-2);
      font-size: 18px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 4px;
      margin-bottom: 4px;
    }
    .btn-attach:hover { background: var(--border-light); color: var(--text-1); }
    .btn-attach:active { opacity: 0.8; }

    /* ── Terminal ── */
    .terminal-messages .msg {
      animation-duration: 0.08s;
    }

    .terminal-cwd {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 4px;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 2px 8px;
      background: var(--bg-2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .terminal-output .terminal-pre {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      background: none;
      color: inherit;
    }

    .msg.user .terminal-prompt {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      opacity: 0.6;
      margin-right: 6px;
      font-size: 13px;
    }

    .msg.user .terminal-cmd {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .msg.stdin-msg {
      align-self: flex-end;
      background: var(--bg-3);
      border-radius: 16px 16px 4px 16px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--text-1);
      max-width: 75%;
    }

    .terminal-input-wrap {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    .terminal-input-prompt {
      color: var(--text-2);
      font-size: 14px;
      line-height: 1;
      padding: 6px 0;
      flex-shrink: 0;
      user-select: none;
    }

    .terminal-input-prompt.stdin-mode {
      color: var(--orange);
    }

    .terminal-input {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace !important;
      font-size: 14px !important;
    }

    .btn-kill {
      background: var(--red) !important;
    }
    .btn-kill:hover { background: #e63329 !important; }

    .terminal-exit-code {
      display: inline-block;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-top: 4px;
    }
    .terminal-exit-code.success {
      color: var(--green);
      background: var(--green-dim);
    }
    .terminal-exit-code.error {
      color: var(--red);
      background: var(--red-dim);
    }

    .selected-images {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .image-preview {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remove-image {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-image:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    .drop-zone {
      position: fixed;
      inset: 0;
      background: rgba(59, 130, 246, 0.15);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    .drop-zone.active {
      display: flex;
    }

    .drop-zone-message {
      font-size: 24px;
      font-weight: 600;
      color: #3b82f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: var(--bg-0);
      padding: 32px 48px;
      border-radius: 16px;
      border: 3px dashed #3b82f6;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    .drop-zone-icon {
      width: 64px;
      height: 64px;
      opacity: 0.9;
    }

    /* ── Settings modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 560px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.2px; }
    .modal h3 {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; font-weight: 500; }
    .form-row input, .form-row select {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-0);
      font-size: 13px;
      outline: none;
      transition: all var(--transition);
    }
    .form-row input:focus, .form-row select:focus {
      border-color: rgba(124,106,255,0.4);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: var(--bg-1);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: -0.1px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(124,106,255,0.2); }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-1); }
    .btn-ghost:hover { background: var(--bg-2); border-color: var(--border-light); }
    .btn-danger { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.15); }
    .btn-test { background: var(--green-dim); border: 1px solid rgba(52,211,153,0.2); color: var(--green); }
    .btn-test:hover { background: rgba(52,211,153,0.15); }
    .btn-test:disabled { opacity: 0.4; cursor: not-allowed; }

    .test-result {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      font-family: 'JetBrains Mono', monospace;
    }
    .test-result.success { background: var(--green-dim); border: 1px solid rgba(52,211,153,0.2); color: var(--green); }
    .test-result.failure { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }
    .test-result.testing { background: var(--orange-dim); border: 1px solid rgba(251,191,36,0.2); color: var(--orange); }

    .presets-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .preset-card {
      padding: 16px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }
    .preset-card:hover { border-color: rgba(124,106,255,0.3); background: var(--accent-subtle); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .preset-card-icon { font-size: 22px; margin-bottom: 8px; font-weight: 700; }
    .preset-card-name { font-size: 13px; font-weight: 600; letter-spacing: -0.1px; }
    .preset-card-desc { font-size: 11px; color: var(--text-2); margin-top: 4px; line-height: 1.4; }

    .empty-list {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ── Provider colors ── */
    .provider-openclaws { background: #FF9500; color: white; }
    .provider-openai { background: #34C759; color: white; }
    .provider-claude-code { background: #FFCC00; color: #000; }
    .provider-hermes { background: #AF52DE; color: white; }
    .provider-codex { background: #34C759; color: white; }
    .provider-terminal { background: #1a1a2e; color: #00ff41; border: 1px solid #00ff41; }
    .provider-generic { background: #007AFF; color: white; }

    /* ── Slash Command Palette ── */
    .slash-palette {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      margin-bottom: 6px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: var(--shadow-lg);
      animation: paletteIn 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 4px;
    }
    @keyframes paletteIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slash-palette-item {
      padding: 9px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.1s;
      border-radius: 8px;
    }
    .slash-palette-item:hover, .slash-palette-item.selected {
      background: var(--accent-subtle);
    }
    .slash-palette-item.selected {
      background: var(--accent-subtle);
      border: 1px solid rgba(124,106,255,0.15);
    }
    .slash-palette-item-name {
      font-size: 13px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }
    .slash-palette-item-desc {
      font-size: 12px;
      color: var(--text-2);
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all var(--transition);
      -webkit-app-region: no-drag;
    }
    .theme-toggle:hover { background: var(--bg-3); color: var(--text-0); }

    /* ── Chat empty state ── */
    .chat-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      padding: 40px;
    }
    .chat-empty-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--accent-subtle);
      border: 1px solid rgba(124,106,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .chat-empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.2px;
    }
    .chat-empty-hint {
      font-size: 13px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chat-empty-kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 5px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Agent card in settings ── */
    .settings-agent-card {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      margin-bottom: 6px;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .settings-agent-card:hover {
      background: var(--bg-2);
      border-color: var(--border-light);
    }
    .settings-agent-card .edit-arrow {
      font-size: 12px;
      color: var(--text-2);
      margin-left: auto;
      transition: all var(--transition);
    }
    .settings-agent-card:hover .edit-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Audio element for notification sound - using MP3 for better compatibility -->
  <audio id="notificationSound" preload="auto">
    <source src="assets/notification.mp3" type="audio/mpeg">
    <source src="assets/imessage-sound.aiff" type="audio/aiff">
  </audio>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Default agents config ──
    const DEFAULT_AGENTS = [
      {
        id: 'claude-code-1',
        name: 'Claude Code',
        provider: 'claude-code',
        workDir: '',
        model: '',
        claudePath: '',
        claudeArgs: '',
        emoji: 'CC',
        providerClass: 'provider-claude-code',
        maxTokens: 16384,
      },
    ];

    function loadAgents() {
      try {
        const saved = localStorage.getItem('agent-hub-agents');
        if (!saved) return DEFAULT_AGENTS;
        const agents = JSON.parse(saved);
        // Clear stale sessionIds — they won't survive an app restart
        return agents.map(a => ({ ...a, sessionId: null }));
      } catch { return DEFAULT_AGENTS; }
    }

    function saveAgents(agents) {
      localStorage.setItem('agent-hub-agents', JSON.stringify(agents));
    }

    function loadChats() {
      try {
        const saved = localStorage.getItem('agent-hub-chats');
        return saved ? JSON.parse(saved) : {};
      } catch { return {}; }
    }

    function saveChats(chats) {
      localStorage.setItem('agent-hub-chats', JSON.stringify(chats));
    }

    function loadLastActivityTime() {
      try {
        const saved = localStorage.getItem('agent-hub-activity-times');
        return saved ? JSON.parse(saved) : {};
      } catch { return {}; }
    }

    function saveLastActivityTime(times) {
      localStorage.setItem('agent-hub-activity-times', JSON.stringify(times));
    }

    // ── Auth Login Button (in-app, no terminal) ──
    function AuthLoginButton({ agent, onSuccess }) {
      const [authState, setAuthState] = useState('idle'); // idle | logging-in | waiting-for-code | success | error
      const [authMsg, setAuthMsg] = useState('');
      const [codeInput, setCodeInput] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const codeRef = useRef(null);

      useEffect(() => {
        const handleStatus = (agentId, status) => {
          if (agentId !== agent.id) return;
          if (status === 'waiting-for-code') {
            setAuthState('waiting-for-code');
            setAuthMsg('Browser opened — paste the code you see after logging in.');
            setSubmitting(false);
            setTimeout(() => codeRef.current?.focus(), 100);
          } else if (status === 'authenticated') {
            setAuthState('success');
            setAuthMsg('Authenticated!');
            if (onSuccess) onSuccess();
          } else if (status === 'error') {
            // Only show error if we're not already in success state
            setAuthState(prev => prev === 'success' ? prev : 'error');
            setAuthMsg(prev => prev || 'Authentication failed. Please try again.');
            setSubmitting(false);
          }
        };
        window.agentHub.onAuthStatus(handleStatus);
        return () => window.agentHub.removeAuthListeners();
      }, [agent.id]);

      const handleLogin = async () => {
        setAuthState('logging-in');
        setAuthMsg('Starting login...');
        setCodeInput('');
        setSubmitting(false);
        const res = await window.agentHub.authLogin(agent);
        // The handler returns immediately with pending: true.
        // All real updates come via auth-status events above.
        if (res.error) {
          setAuthState('error');
          setAuthMsg(res.error);
        }
      };

      const handleSubmitCode = async () => {
        if (!codeInput.trim()) return;
        setSubmitting(true);
        setAuthMsg('Code submitted — waiting for confirmation...');
        const res = await window.agentHub.authSendInput(agent.id, codeInput.trim());
        if (res.error) {
          setSubmitting(false);
          setAuthState('error');
          setAuthMsg(res.error);
        }
        // If no error, stay in submitting state — the auth-status event
        // will move us to 'success' or 'error' when the process completes.
      };

      const handleCodeKeyDown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSubmitCode();
        }
      };

      return (
        <div style={{ marginTop: 10 }}>
          {authState === 'idle' && (
            <button className="btn btn-primary" onClick={handleLogin}>
              Login
            </button>
          )}
          {authState === 'logging-in' && (
            <button className="btn btn-primary" disabled style={{ opacity: 0.7 }}>
              Logging in...
            </button>
          )}
          {authState === 'waiting-for-code' && (
            <div>
              <div style={{ fontSize: 13, color: submitting ? 'var(--text-2)' : 'var(--orange)', marginBottom: 8 }}>
                {authMsg}
              </div>
              {!submitting && (
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <input
                    ref={codeRef}
                    type="text"
                    value={codeInput}
                    onChange={(e) => setCodeInput(e.target.value)}
                    onKeyDown={handleCodeKeyDown}
                    placeholder="Paste code here"
                    style={{
                      background: 'var(--bg-2)',
                      border: '1px solid var(--border-light)',
                      borderRadius: 'var(--radius-sm)',
                      padding: '6px 10px',
                      color: 'var(--text-0)',
                      fontFamily: 'JetBrains Mono, monospace',
                      fontSize: 14,
                      width: 220,
                      letterSpacing: '2px',
                    }}
                  />
                  <button
                    className="btn btn-primary"
                    onClick={handleSubmitCode}
                    disabled={!codeInput.trim()}
                  >
                    Submit
                  </button>
                </div>
              )}
            </div>
          )}
          {authState === 'success' && (
            <div style={{ fontSize: 13, color: 'var(--green)', marginTop: 4 }}>
              {authMsg}
            </div>
          )}
          {authState === 'error' && (
            <div>
              <div style={{ fontSize: 13, color: 'var(--red)', marginTop: 4 }}>{authMsg}</div>
              <button className="btn btn-primary" style={{ marginTop: 6 }} onClick={handleLogin}>
                Retry
              </button>
            </div>
          )}
        </div>
      );
    }

    // ── App ──
    function App() {
      const [agents, setAgents] = useState(loadAgents);
      const [activeId, setActiveId] = useState(null);
      const [chats, setChats] = useState(loadChats);
      const [statuses, setStatuses] = useState({});
      const [completionStatus, setCompletionStatus] = useState({});
      const [showSettings, setShowSettings] = useState(false);
      const [editAgent, setEditAgent] = useState(null);
      const [theme, setTheme] = useState('dark');
      const [loadingAgents, setLoadingAgents] = useState(new Set());
      const [lastActivityTime, setLastActivityTime] = useState(loadLastActivityTime);

      const activeAgent = agents.find(a => a.id === activeId);

      useEffect(() => { saveAgents(agents); }, [agents]);
      useEffect(() => { saveChats(chats); }, [chats]);
      useEffect(() => { saveLastActivityTime(lastActivityTime); }, [lastActivityTime]);

      // Sync theme with macOS system appearance
      useEffect(() => {
        window.agentHub.getSystemTheme().then(isDark => {
          setTheme(isDark ? 'dark' : 'light');
        });
        window.agentHub.onThemeChange(isDark => {
          setTheme(isDark ? 'dark' : 'light');
        });
        return () => {
          window.agentHub.removeStreamListeners?.();
          window.agentHub.removeTerminalListeners?.();
        };
      }, []);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.className = theme === 'light' ? 'light-theme' : '';
        document.body.style.background = theme === 'light' ? '#f4f4f8' : '#09090f';
        document.body.style.color = theme === 'light' ? '#16162a' : '#eeeef4';
      }, [theme]);

      // Ping all agents on load
      useEffect(() => {
        agents.forEach(agent => {
          setStatuses(s => ({ ...s, [agent.id]: 'checking' }));
          window.agentHub.ping(agent).then(res => {
            setStatuses(s => ({ ...s, [agent.id]: res.online ? 'online' : 'offline' }));
          });
        });
      }, [agents.length]);

      const updateAgent = (updated) => {
        setAgents(prev => {
          const exists = prev.some(a => a.id === updated.id);
          if (exists) return prev.map(a => a.id === updated.id ? updated : a);
          return [...prev, updated];
        });
        setEditAgent(null);
      };

      const addAgent = () => {
        setEditAgent(null);
        setShowSettings(true);
        // The modal will show presets view when editAgent is null and user clicks "+ Add Agent"
      };

      const removeAgent = (id) => {
        setAgents(prev => prev.filter(a => a.id !== id));
        setChats(prev => { const next = { ...prev }; delete next[id]; return next; });
        if (activeId === id) setActiveId(null);
        setEditAgent(null);
      };

      const onlineCount = Object.values(statuses).filter(s => s === 'online').length;

      return (
        <>
          <div className="titlebar">
            <div className="titlebar-dot" />
            <span className="titlebar-title">AGENT HUB</span>
            <div style={{ flex: 1 }} />
            {/* Theme follows macOS system appearance */}
          </div>
          <div className="app-body">
            <Sidebar
              agents={agents}
              activeId={activeId}
              statuses={statuses}
              loadingAgents={loadingAgents}
              completionStatus={completionStatus}
              onSelect={(agentId) => {
                setActiveId(agentId);
                // Clear completion status when clicking into the agent's thread
                setCompletionStatus(prev => ({ ...prev, [agentId]: null }));
              }}
              onAdd={addAgent}
              onOpenSettings={() => setShowSettings(true)}
              lastActivityTime={lastActivityTime}
            />
            <div className="main-area">
              {!activeAgent && (
                <Dashboard agents={agents} statuses={statuses} onlineCount={onlineCount} />
              )}
              {agents.map(ag => (
                <div key={ag.id} style={{ display: activeId === ag.id ? 'contents' : 'none' }}>
                  {isTerminalProvider(ag.provider) ? (
                    <TerminalView
                      agent={ag}
                      isActive={activeId === ag.id}
                      status={statuses[ag.id]}
                      messages={chats[ag.id] || []}
                      setMessages={(msgs) => setChats(prev => ({ ...prev, [ag.id]: typeof msgs === 'function' ? msgs(prev[ag.id] || []) : msgs }))}
                      onLoadingChange={(isLoading) => {
                        setLoadingAgents(prev => {
                          const next = new Set(prev);
                          if (isLoading) next.add(ag.id);
                          else next.delete(ag.id);
                          return next;
                        });
                      }}
                      setLastActivityTime={setLastActivityTime}
                    />
                  ) : (
                    <ChatView
                      agent={ag}
                      isActive={activeId === ag.id}
                      status={statuses[ag.id]}
                      messages={chats[ag.id] || []}
                      setMessages={(msgs) => setChats(prev => ({ ...prev, [ag.id]: typeof msgs === 'function' ? msgs(prev[ag.id] || []) : msgs }))}
                      onUpdateAgent={updateAgent}
                      completionStatus={completionStatus[ag.id]}
                      setCompletionStatus={(status) => setCompletionStatus(prev => ({ ...prev, [ag.id]: typeof status === 'function' ? status(prev[ag.id]) : status }))}
                      onLoadingChange={(isLoading) => {
                        setLoadingAgents(prev => {
                          const next = new Set(prev);
                          if (isLoading) next.add(ag.id);
                          else next.delete(ag.id);
                          return next;
                        });
                      }}
                      setLastActivityTime={setLastActivityTime}
                    />
                  )}
                </div>
              ))}
            </div>
          </div>

          {showSettings && (
            <SettingsModal
              agents={agents}
              editAgent={editAgent}
              setEditAgent={setEditAgent}
              onUpdate={updateAgent}
              onRemove={removeAgent}
              onAdd={addAgent}
              onClose={() => { setShowSettings(false); setEditAgent(null); }}
            />
          )}
        </>
      );
    }

    // ── Model aliases (Claude Code resolves these to the latest version) ──
    const CLAUDE_MODEL_ALIASES = [
      { id: 'sonnet', label: 'Sonnet' },
      { id: 'opus', label: 'Opus' },
      { id: 'haiku', label: 'Haiku' },
    ];

    const CLAUDE_EFFORT_LEVELS = [
      { id: '', label: 'Default' },
      { id: 'low', label: 'Low' },
      { id: 'medium', label: 'Medium' },
      { id: 'high', label: 'High' },
      { id: 'max', label: 'Max' },
    ];

    const CODEX_REASONING_EFFORTS = ['low', 'medium', 'high', 'xhigh'];
    const CODEX_REASONING_EFFORT_LABELS = {
      minimal: 'Minimal',
      low: 'Low',
      medium: 'Medium',
      high: 'High',
      xhigh: 'Extra High',
    };

    function isClaudeCodeProvider(provider) {
      return provider === 'claude-code' || provider === 'claude-code-ssh';
    }

    function isCodexProvider(provider) {
      return provider === 'codex' || provider === 'codex-ssh';
    }

    function isTerminalProvider(provider) {
      return provider === 'terminal' || provider === 'terminal-ssh';
    }

    function formatModelLabel(modelId) {
      if (!modelId) return '';
      const parts = modelId.split('-');
      const formatPart = (part) => {
        if (/^o\d/i.test(part)) return part.toUpperCase();
        if (/^\d/.test(part)) return part;
        return part.charAt(0).toUpperCase() + part.slice(1);
      };
      if (/^gpt$/i.test(parts[0]) && parts[1]) {
        return [`GPT-${parts[1]}`, ...parts.slice(2).map(formatPart)].join(' ');
      }
      return parts.map(formatPart).join(' ');
    }

    function getStaticModelAliases(provider) {
      if (isClaudeCodeProvider(provider)) return CLAUDE_MODEL_ALIASES;
      return [];
    }

    function normalizeCodexReasoningEffort(effort) {
      if (!effort) return '';
      if (effort === 'max') return 'xhigh';
      if (['minimal', 'low', 'medium', 'high', 'xhigh'].includes(effort)) return effort;
      return '';
    }

    function formatReasoningEffortLabel(effort) {
      return CODEX_REASONING_EFFORT_LABELS[effort] || formatModelLabel(effort);
    }

    function uniqueReasoningEfforts(efforts) {
      return [...new Set((efforts || []).map(normalizeCodexReasoningEffort).filter(Boolean))];
    }

    function getCodexReasoningEffortOptions(modelInfo) {
      const supportedEfforts = uniqueReasoningEfforts(modelInfo?.supportedReasoningLevels);
      const defaultEffort = normalizeCodexReasoningEffort(modelInfo?.defaultReasoningLevel);
      const efforts = supportedEfforts.length ? supportedEfforts : CODEX_REASONING_EFFORTS;
      return [
        { id: '', label: defaultEffort ? `Default (${formatReasoningEffortLabel(defaultEffort)})` : 'Default' },
        ...efforts.map(id => ({ id, label: formatReasoningEffortLabel(id) })),
      ];
    }

    function updateCodexReasoningEffort(agent, reasoningEffort) {
      const updated = { ...agent, reasoningEffort };
      delete updated.effortLevel;
      return updated;
    }

    // ── Sidebar ──
    function Sidebar({ agents, activeId, statuses, loadingAgents, completionStatus, onSelect, onAdd, onOpenSettings, lastActivityTime }) {
      // Sort agents by last activity time (most recent first)
      const sortedAgents = [...agents].sort((a, b) => {
        const timeA = lastActivityTime[a.id] || 0;
        const timeB = lastActivityTime[b.id] || 0;
        return timeB - timeA;
      });

      return (
        <div className="sidebar">
          <div className="sidebar-header">
            <h2>Agents</h2>
            <button className="btn-icon" onClick={onAdd} title="Add agent">+</button>
          </div>
          <div className="agent-list">
            {sortedAgents.length === 0 && <div className="empty-list">No agents yet. Click + to add one.</div>}
            {sortedAgents.map(agent => (
              <div
                key={agent.id}
                className={`agent-card ${activeId === agent.id ? 'active' : ''}`}
                onClick={() => onSelect(agent.id)}
              >
                <div className="agent-card-header">
                  <div className={`agent-avatar ${agent.providerClass}`}>
                    {agent.emoji}
                  </div>
                  <div className="agent-info">
                    <div className="agent-name">
                      <span className="agent-name-text">{agent.name}</span>
                      {loadingAgents.has(agent.id) && (
                        <span className="agent-thinking-indicator" title="Typing">
                          <span /><span /><span />
                        </span>
                      )}
                      {typeof completionStatus[agent.id] === 'number' && completionStatus[agent.id] > 0 && (
                        <span className="agent-completion-badge" title="Unread Messages">
                          {completionStatus[agent.id]}
                        </span>
                      )}
                    </div>
                    <div className="agent-provider">
                      {agent.provider === 'claude-code' ? 'Claude Code' : agent.provider === 'claude-code-ssh' ? 'Claude Code SSH' : agent.provider === 'openclaw-local' ? 'OpenClaw Local' : agent.provider === 'openclaw' ? 'OpenClaw' : agent.provider === 'hermes-local' ? 'Hermes Local' : agent.provider === 'hermes' ? 'Hermes SSH' : agent.provider === 'codex' ? 'Codex' : agent.provider === 'codex-ssh' ? 'Codex SSH' : agent.provider === 'terminal' ? 'Terminal' : agent.provider === 'terminal-ssh' ? 'Terminal SSH' : agent.provider === 'openai-compat' ? 'OpenAI Compat' : agent.provider}
                      {agent.model ? ` / ${(getStaticModelAliases(agent.provider).find(m => m.id === agent.model) || {}).label || formatModelLabel(agent.model) || agent.model}` : ''}
                    </div>
                  </div>
                  <div className={`status-dot ${statuses[agent.id] || 'offline'}`} />
                </div>
              </div>
            ))}
          </div>
          <div className="sidebar-footer">
            <button className="btn-settings" onClick={onOpenSettings}>
              <span style={{ fontSize: '14px' }}>&#9881;</span> Settings
            </button>
          </div>
        </div>
      );
    }

    // ── Dashboard ──
    function Dashboard({ agents, statuses, onlineCount }) {
      return (
        <div className="dashboard">
          <div className="dash-logo">AH</div>
          <div className="dash-title">Agent Hub</div>
          <div className="dash-sub">
            Your unified command center for AI agents. Select one from the sidebar to start chatting, or add a new one.
          </div>
          <div className="dash-grid">
            <div className="dash-stat">
              <div className="dash-stat-num" style={{ color: 'var(--accent)' }}>{agents.length}</div>
              <div className="dash-stat-label">Total Agents</div>
            </div>
            <div className="dash-stat">
              <div className="dash-stat-num" style={{ color: 'var(--green)' }}>{onlineCount}</div>
              <div className="dash-stat-label">Online</div>
            </div>
            <div className="dash-stat">
              <div className="dash-stat-num" style={{ color: agents.length - onlineCount > 0 ? 'var(--red)' : 'var(--text-2)' }}>{agents.length - onlineCount}</div>
              <div className="dash-stat-label">Offline</div>
            </div>
          </div>
        </div>
      );
    }

    // ── Message Content Component ──
    function MessageContent({ content }) {
      const [html, setHtml] = useState('');
      const contentRef = useRef(null);

      useEffect(() => {
        if (!content) {
          setHtml('');
          return;
        }

        // Configure marked options for safe rendering
        if (window.marked) {
          window.marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
            mangle: false
          });

          try {
            // Parse markdown to HTML
            const parsed = window.marked.parse(content);
            setHtml(parsed);
          } catch (err) {
            // Fallback to plain text if parsing fails
            console.error('Markdown parsing error:', err);
            setHtml(content);
          }
        } else {
          // If marked isn't loaded, just display as text
          setHtml(content);
        }
      }, [content]);

      // Add click handlers for external links
      useEffect(() => {
        if (!contentRef.current) return;

        const handleLinkClick = (e) => {
          const target = e.target.closest('a');
          if (!target) return;

          const href = target.getAttribute('href');
          if (!href) return;

          // Check if it's an external link (http, https, or other protocols)
          if (href.startsWith('http://') || href.startsWith('https://') ||
              href.startsWith('mailto:') || href.startsWith('tel:') ||
              !href.startsWith('#') && !href.startsWith('/')) {
            e.preventDefault();
            window.agentHub.openExternal(href);
          }
        };

        contentRef.current.addEventListener('click', handleLinkClick);
        return () => {
          if (contentRef.current) {
            contentRef.current.removeEventListener('click', handleLinkClick);
          }
        };
      }, [html]);

      // Render HTML content safely
      return (
        <div
          ref={contentRef}
          className="message-content"
          dangerouslySetInnerHTML={{ __html: html }}
        />
      );
    }

    // ── Chat View ──
    function ThinkingBlock({ thinking }) {
      const [open, setOpen] = useState(true);
      if (!thinking) return null;
      return (
        <div className="thinking-block">
          <button className="thinking-toggle" onClick={() => setOpen(!open)}>
            <span className="thinking-icon">{open ? '▾' : '▸'}</span>
            <span>Thinking</span>
          </button>
          {open && (
            <div className="thinking-content">{thinking}</div>
          )}
        </div>
      );
    }

    function ToolUseIndicator({ tool, input, denied }) {
      let display = tool;
      if (tool === 'Bash' && input?.command) {
        display = `$ ${input.command.length > 100 ? input.command.slice(0, 100) + '...' : input.command}`;
      } else if (tool === 'Write' && input?.file_path) {
        display = `Write: ${input.file_path}`;
      } else if (tool === 'Edit' && input?.file_path) {
        display = `Edit: ${input.file_path}`;
      } else if (tool === 'Read' && input?.file_path) {
        display = `Read: ${input.file_path}`;
      } else if (tool === 'Grep' && input?.pattern) {
        display = `Grep: ${input.pattern}`;
      } else if (tool === 'Glob' && input?.pattern) {
        display = `Glob: ${input.pattern}`;
      } else if (tool === 'exec' && input?.command) {
        display = `$ ${input.command.length > 100 ? input.command.slice(0, 100) + '...' : input.command}`;
      } else if (['read', 'write', 'edit', 'apply_patch'].includes(tool) && input?.path) {
        display = `${tool}: ${input.path}`;
      } else if (['web_search', 'web_fetch', 'memory_search', 'memory_get', 'image'].includes(tool)) {
        display = tool.replace(/_/g, ' ');
      }
      return (
        <div className={`tool-use-indicator${denied ? ' denied' : ''}`}>
          <span className="tool-icon">{denied ? '\u2718' : '\u2699'}</span>
          <span>{display}</span>
        </div>
      );
    }

    function PermissionBanner({ denials, onAllowRetry, onAlwaysAllow, onDismiss }) {
      return (
        <div className="permission-banner">
          <div className="permission-banner-title">
            \u26A0 Permission Denied
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-1)', marginBottom: 8 }}>
            Claude tried to use these tools but they were blocked:
          </div>
          <ul className="permission-banner-list">
            {denials.map((d, i) => (
              <li key={i}>
                <strong>{d.tool}</strong>
                {d.input?.command ? `: ${d.input.command.length > 120 ? d.input.command.slice(0, 120) + '...' : d.input.command}` : ''}
                {d.input?.file_path && !d.input?.command ? `: ${d.input.file_path}` : ''}
              </li>
            ))}
          </ul>
          <div className="permission-banner-actions">
            <button className="btn-allow" onClick={onAllowRetry}>Allow &amp; Retry</button>
            <button className="btn-always" onClick={onAlwaysAllow}>Always Allow</button>
            <button className="btn-dismiss" onClick={onDismiss}>Dismiss</button>
          </div>
        </div>
      );
    }

    function ToolApprovalRequest({ request, onApprove, onAlwaysAllow, onDeny, resolved }) {
      let detail = request.tool;
      if (request.tool === 'Bash' && request.input?.command) {
        detail = `$ ${request.input.command}`;
      } else if ((request.tool === 'Write' || request.tool === 'Edit' || request.tool === 'Read') && request.input?.file_path) {
        detail = `${request.tool}: ${request.input.file_path}`;
      } else if ((request.tool === 'Grep' || request.tool === 'Glob') && request.input?.pattern) {
        detail = `${request.tool}: ${request.input.pattern}`;
      } else if (request.input) {
        const preview = JSON.stringify(request.input);
        detail = `${request.tool}: ${preview.length > 200 ? preview.slice(0, 200) + '...' : preview}`;
      }

      return (
        <div className={`tool-approval-request${resolved ? ' tool-approval-resolved' : ''}`}>
          <div className="tool-approval-header">
            <div className="tool-approval-icon">{'\u26A0'}</div>
            <div className="tool-approval-title">Approve {request.tool}?</div>
            {!resolved && (
              <div className="tool-approval-waiting">
                <div className="pulse" />
                Waiting for approval
              </div>
            )}
          </div>
          <div className="tool-approval-detail">{detail}</div>
          {!resolved && (
            <div className="tool-approval-actions">
              <button className="btn-approve" onClick={() => onApprove(request)}>Allow</button>
              <button className="btn-always-allow" onClick={() => onAlwaysAllow(request)}>Always Allow</button>
              <button className="btn-deny" onClick={() => onDeny(request)}>Deny</button>
            </div>
          )}
          {resolved === 'approved' && <div className="tool-approval-status approved">Approved</div>}
          {resolved === 'denied' && <div className="tool-approval-status denied">Denied</div>}
        </div>
      );
    }

    function ChatView({ agent, isActive, status, messages, setMessages, onUpdateAgent, completionStatus, setCompletionStatus, onLoadingChange, setLastActivityTime }) {
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [streamText, setStreamText] = useState('');
      const [streamThinking, setStreamThinking] = useState('');
      const [toolUses, setToolUses] = useState([]);
      const [permDenials, setPermDenials] = useState(null);
      const [permRequests, setPermRequests] = useState([]);  // real-time approval requests
      const [resolvedPerms, setResolvedPerms] = useState({}); // toolUseId -> 'approved'|'denied'
      const [lastUserMessage, setLastUserMessage] = useState('');
      const [sessionAllowedTools, setSessionAllowedTools] = useState([]);
      const [alwaysAllowedTools, setAlwaysAllowedTools] = useState(new Set()); // tools auto-approved for this session
      const [slashCommands, setSlashCommands] = useState([]);
      const [showSlash, setShowSlash] = useState(false);
      const [slashIdx, setSlashIdx] = useState(0);
      const [showThinking, setShowThinking] = useState(true);
      const [selectedImages, setSelectedImages] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [modelOpen, setModelOpen] = useState(false);
      const [effortOpen, setEffortOpen] = useState(false);
      const [codexModels, setCodexModels] = useState([]);
      const [codexDefaultModel, setCodexDefaultModel] = useState('');
      const [modelLoadState, setModelLoadState] = useState('idle');
      const [modelLoadError, setModelLoadError] = useState('');
      const bottomRef = useRef(null);
      const inputRef = useRef(null);
      const chatAreaRef = useRef(null);
      const streamTextRef = useRef('');
      const streamThinkingRef = useRef('');
      const dragCounter = useRef(0);
      const toolUsesRef = useRef([]);
      const activeRequestIdRef = useRef(null);
      const alwaysAllowedToolsRef = useRef(new Set());
      const modelRef = useRef(null);
      const effortRef = useRef(null);
      const isClaudeProvider = isClaudeCodeProvider(agent.provider);
      const isCodexAgent = isCodexProvider(agent.provider);
      const hasModelPicker = isClaudeProvider || isCodexAgent;
      const hasEffortPicker = isClaudeProvider || isCodexAgent;

      // Close model/effort dropdowns on outside click
      useEffect(() => {
        const handler = (e) => {
          if (modelRef.current && !modelRef.current.contains(e.target)) setModelOpen(false);
          if (effortRef.current && !effortRef.current.contains(e.target)) setEffortOpen(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      useEffect(() => {
        if (!isCodexAgent) {
          setCodexModels([]);
          setCodexDefaultModel('');
          setModelLoadState('idle');
          setModelLoadError('');
          return;
        }

        let cancelled = false;
        setModelLoadState('loading');
        setModelLoadError('');

        window.agentHub.listModels(agent)
          .then(res => {
            if (cancelled) return;
            const models = Array.isArray(res?.models) ? res.models : [];
            setCodexModels(models);
            setCodexDefaultModel(res?.defaultModel || models[0]?.id || '');
            setModelLoadError(res?.error || '');
            setModelLoadState('ready');
          })
          .catch(err => {
            if (cancelled) return;
            setCodexModels([]);
            setCodexDefaultModel('');
            setModelLoadError(err.message || 'Could not load Codex models.');
            setModelLoadState('error');
          });

        return () => { cancelled = true; };
      }, [
        isCodexAgent,
        agent.id,
        agent.provider,
        agent.codexPath,
        agent.sshHost,
        agent.sshUser,
        agent.sshPort,
        agent.sshKey,
        agent.apiKey,
      ]);

      const discoveredModelAliases = isCodexAgent ? codexModels : getStaticModelAliases(agent.provider);
      const modelAliases = agent.model && !discoveredModelAliases.some(m => m.id === agent.model)
        ? [{ id: agent.model, label: formatModelLabel(agent.model) }, ...discoveredModelAliases]
        : discoveredModelAliases;
      const currentModel = agent.model || codexDefaultModel || (modelAliases[0]?.id || '');
      const currentModelLabel = modelAliases.find(m => m.id === currentModel)?.label || formatModelLabel(currentModel) || (isCodexAgent ? (modelLoadState === 'loading' ? 'Loading models...' : 'Codex model') : 'Sonnet');

      const switchModel = (modelId) => {
        onUpdateAgent({ ...agent, model: modelId });
        setModelOpen(false);
      };

      const currentCodexModelInfo = isCodexAgent ? modelAliases.find(m => m.id === currentModel) : null;
      const baseEffortLevels = isCodexAgent ? getCodexReasoningEffortOptions(currentCodexModelInfo) : CLAUDE_EFFORT_LEVELS;
      const currentEffort = isCodexAgent ? normalizeCodexReasoningEffort(agent.reasoningEffort || agent.effortLevel) : (agent.effortLevel || '');
      const effortLevels = currentEffort && !baseEffortLevels.some(e => e.id === currentEffort)
        ? [...baseEffortLevels, { id: currentEffort, label: formatReasoningEffortLabel(currentEffort) }]
        : baseEffortLevels;
      const currentEffortLabel = effortLevels.find(e => e.id === currentEffort)?.label || 'Default';

      const switchEffort = (effortId) => {
        onUpdateAgent(isCodexAgent ? updateCodexReasoningEffort(agent, effortId) : { ...agent, effortLevel: effortId });
        setEffortOpen(false);
      };

      // Keep refs to the latest agent/isActive so stream callbacks never use a stale closure
      const agentRef = useRef(agent);
      agentRef.current = agent;
      const isActiveRef = useRef(isActive);
      isActiveRef.current = isActive;

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, streamText, streamThinking, permRequests, agent.id]);

      useEffect(() => {
        inputRef.current?.focus();
      }, [agent.id]);

      // Set up stream listeners — each ChatView stays mounted, so listeners
      // persist across agent switches. Each callback filters by its own requestId.
      useEffect(() => {
        let cancelled = false;

        const offChunk = window.agentHub.onStreamChunk((id, text) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          streamTextRef.current += text;
          setStreamText(streamTextRef.current);
        });

        const offThinking = window.agentHub.onStreamThinking((id, text) => {
          if (cancelled || id !== activeRequestIdRef.current) return;
          streamThinkingRef.current += text;
          setStreamThinking(streamThinkingRef.current);
        });

        const offDone = window.agentHub.onStreamDone((id, meta) => {
          if (cancelled || id !== activeRequestIdRef.current) return;

          const content = streamTextRef.current;
          const thinking = streamThinkingRef.current || null;
          if (content) {
            const msg = { role: 'assistant', content };
            if (thinking) msg.thinking = thinking;
            setMessages(prev => [...prev, msg]);
          }

          // Only increment completion status if user is NOT viewing this agent
          // If they're already viewing it, they can see the messages in real-time
          if (!isActiveRef.current) {
            setCompletionStatus(prev => {
              const current = typeof prev === 'number' ? prev : 0;
              return current + 1;
            });
          }

          // Always play notification sound when agent responds
          const audio = document.getElementById('notificationSound');
          if (audio) {
            audio.volume = 1.0; // Ensure volume is at max
            audio.currentTime = 0; // Reset to beginning
            const playPromise = audio.play();
            if (playPromise !== undefined) {
              playPromise.then(() => {
                console.log('Notification sound played successfully for completion');
              }).catch(err => {
                console.error('Notification sound play failed:', err);
                // Try alternative approach for Electron
                try {
                  audio.load();
                  audio.play();
                } catch(e) {
                  console.error('Alternative play method also failed:', e);
                }
              });
            }
          } else {
            console.error('Notification audio element not found');
          }
